<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brain Training</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            touch-action: manipulation;
            background-color: #e8f4fd;
        }

        #gameContainer {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background-color: #e8f4fd;
            font-family: Arial, sans-serif;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
        }

        .image-container {
            position: absolute;
            display: none;
            overflow: hidden;   /* clips rotated image to cell bounds */
        }

        .image-container img {
            border: 2px solid #333;
            display: block;
            transform-origin: center center;
        }

        #showLabel {
            position: absolute;
            background-color: rgba(200, 200, 200, 0.95);
            padding: 5px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: none;
            text-align: center;
            z-index: 100;
            word-wrap: break-word;
        }

        #labelBelow {
            position: absolute;
            background-color: rgba(100, 200, 100, 0.95);
            padding: 5px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: none;
            text-align: center;
            color: white;
            z-index: 100;
            word-wrap: break-word;
        }

        #feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 80, 80, 0.97);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            font-weight: bold;
            text-align: center;
            white-space: pre-line;
            display: none;
            z-index: 300;
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gridCanvas"></canvas>
    <div class="image-container" id="singleImage"><img src="" alt=""></div>
    <div class="image-container" id="leftImage"><img src="" alt=""></div>
    <div class="image-container" id="rightImage"><img src="" alt=""></div>
    <div id="showLabel"></div>
    <div id="labelBelow"></div>
    <div id="feedback"></div>
</div>

<script>
    // ============================================================
    // IMAGE FILES AND DISPLAY NAMES
    // ============================================================
    const IMAGE_URLS = [
        "images/Garabaldi-Tiny.jpg",
        "images/Red-Phalarope.jpg",
        "images/Red-neck-Phalarope.jpg"
    ];
    const IMAGE_NAMES = [
        "Garibaldi",
        "Red Phalarope",
        "Red-necked Phalarope"
    ];
    // ============================================================

    const GRID_LINES       = 4;
    const GRID_COLS        = GRID_LINES + 1;
    const GRID_ROWS        = GRID_LINES + 1;
    const SHOW_SINGLE_MS   = 1000;
    const GAP_BEFORE_PAIR  = 500;
    const CORRECT_FLASH_MS = 3000;
    const INCORRECT_MS     = 3000;
    const WRONG_IMG_MS     = 500;
    const IMG_PAD          = 4;
    const ASPECT_W         = 16;
    const ASPECT_H         = 9;

    let W, H, cellW, cellH;
    let imgW, imgH;       // rendered size of img element
    let doRotate = false; // true when cell is portrait → rotate image 90°

    function recalc() {
        let container = document.getElementById("gameContainer");
        W = container.clientWidth;
        H = container.clientHeight;
        cellW = W / GRID_COLS;
        cellH = H / GRID_ROWS;

        let maxW = cellW - IMG_PAD * 2;
        let maxH = cellH - IMG_PAD * 2;

        // Is the cell portrait? (taller than wide)
        // If so, rotate the 16:9 image 90° so it becomes 9:16 fitting a tall cell
        doRotate = (cellH > cellW);

        if (doRotate) {
            // Image will be rotated 90°, so its visual width becomes its rendered height
            // Fit 9:16 (rotated 16:9) into maxW x maxH
            // rendered img dims before rotation: we draw it as ASPECT_H wide, ASPECT_W tall
            // then rotate — visually it becomes ASPECT_W wide, ASPECT_H tall
            // We want visual width <= maxW and visual height <= maxH
            // visual width  = rendered imgH  (after 90° rotation)
            // visual height = rendered imgW  (after 90° rotation)
            // So: imgH <= maxW, imgW <= maxH
            // Keep 16:9 ratio: imgW/imgH = 16/9
            // From imgH <= maxW: imgW = imgH * 16/9 <= maxW * 16/9
            // From imgW <= maxH: imgH = imgW * 9/16 <= maxH * 9/16
            let fromW = maxW;                          // imgH = maxW → imgW = maxW*16/9
            let fromH = maxH;                          // imgW = maxH → imgH = maxH*9/16
            let candidate1W = Math.floor(fromW * ASPECT_W / ASPECT_H);
            let candidate1H = Math.floor(fromW);
            let candidate2W = Math.floor(fromH);
            let candidate2H = Math.floor(fromH * ASPECT_H / ASPECT_W);
            // pick whichever fits within both constraints
            if (candidate1W <= maxH) {
                imgW = candidate1W;
                imgH = candidate1H;
            } else {
                imgW = candidate2W;
                imgH = candidate2H;
            }
        } else {
            // Landscape cell — normal fit, no rotation needed
            if (maxW / ASPECT_W * ASPECT_H <= maxH) {
                imgW = Math.floor(maxW);
                imgH = Math.floor(maxW / ASPECT_W * ASPECT_H);
            } else {
                imgH = Math.floor(maxH);
                imgW = Math.floor(maxH / ASPECT_H * ASPECT_W);
            }
        }

        let canvas    = document.getElementById("gridCanvas");
        canvas.width  = W;
        canvas.height = H;

        let fs = Math.max(9, Math.floor(Math.min(cellW, cellH) / 7));
        document.getElementById("showLabel").style.fontSize  = fs + "px";
        document.getElementById("labelBelow").style.fontSize = fs + "px";
        document.getElementById("feedback").style.fontSize   = Math.max(22, fs * 2) + "px";
        document.getElementById("feedback").style.minWidth   = Math.floor(W * 0.35) + "px";
    }

    // Apply correct size + rotation to an image element
    function styleImg(imgEl) {
        imgEl.width  = imgW;
        imgEl.height = imgH;
        if (doRotate) {
            imgEl.style.transform = "rotate(90deg)";
        } else {
            imgEl.style.transform = "none";
        }
    }

    // Position container div centered on grid cell
    // Container size = visual footprint of the (possibly rotated) image
    function placeAt(id, idx) {
        let c   = getCenter(idx);
        let el  = document.getElementById(id);
        let img = el.querySelector("img");

        styleImg(img);

        // Visual dimensions after rotation
        let visW = doRotate ? imgH : imgW;
        let visH = doRotate ? imgW : imgH;

        // Container sized to visual footprint
        el.style.width  = visW + "px";
        el.style.height = visH + "px";
        el.style.left   = (c.x - visW / 2) + "px";
        el.style.top    = (c.y - visH / 2) + "px";
    }

    function getCenter(idx) {
        let row = Math.floor((idx - 1) / GRID_COLS) + 1;
        let col = ((idx - 1) % GRID_COLS) + 1;
        return { x: (col - 0.5) * cellW, y: (row - 0.5) * cellH };
    }

    function getRegion(mx, my) {
        let col = Math.floor(mx / cellW) + 1;
        let row = Math.floor(my / cellH) + 1;
        if (col < 1 || col > GRID_COLS || row < 1 || row > GRID_ROWS) return 0;
        return (row - 1) * GRID_COLS + col;
    }

    let centerIdx = ((Math.ceil(GRID_ROWS / 2) - 1) * GRID_COLS) + Math.ceil(GRID_COLS / 2);
    let leftIdx   = centerIdx - 1;
    let rightIdx  = centerIdx + 1;

    function drawGrid() {
        let ctx = document.getElementById("gridCanvas").getContext("2d");
        ctx.clearRect(0, 0, W, H);
        ctx.strokeStyle = "#000000";
        ctx.lineWidth   = 1;
        for (let i = 1; i <= GRID_LINES; i++) {
            let x = W * i / (GRID_LINES + 1);
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        }
        for (let i = 1; i <= GRID_LINES; i++) {
            let y = H * i / (GRID_LINES + 1);
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }
    }

    function speak(text) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        let fixes = {
            "sea bass":  "see bhass",
            "bass":      "bhass",
            "perch":     "purch",
            "gar":       "garr",
            "soy":       "soe",
            "phalarope": "FAL-a-rope"
        };
        let sorted = Object.keys(fixes).sort((a, b) => b.length - a.length);
        for (let w of sorted)
            text = text.replace(new RegExp("\\b" + w + "\\b", "gi"), fixes[w]);
        let u = new SpeechSynthesisUtterance(text);
        u.rate = 0.9; u.volume = 1;
        window.speechSynthesis.speak(u);
    }

    function showFeedback(msg) {
        let fb = document.getElementById("feedback");
        fb.textContent = msg;
        fb.style.display = "block";
    }
    function hideFeedback() {
        document.getElementById("feedback").style.display = "none";
    }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function rnd(n)    { return Math.floor(Math.random() * n); }

    let clickPhase = 0, correctRegion = 0, correctImgName = "";
    let correctSide = "", nameLabelX = 0, nameLabelY = 0, gameActive = false;

    async function phaseOne() {
        gameActive = false;
        clickPhase = 0;
        recalc();

        let i1 = rnd(IMAGE_URLS.length);
        let i2 = rnd(IMAGE_URLS.length);
        while (i2 === i1) i2 = rnd(IMAGE_URLS.length);

        correctImgName = IMAGE_NAMES[i1];
        correctRegion  = Math.floor(Math.random() * GRID_ROWS * GRID_COLS) + 1;
        let lc = getCenter(correctRegion);

        placeAt("singleImage", centerIdx);
        document.getElementById("singleImage").querySelector("img").src = IMAGE_URLS[i1];

        let lbl = document.getElementById("showLabel");
        lbl.textContent  = correctImgName;
        lbl.style.maxWidth = Math.floor(cellW * 0.88) + "px";
        lbl.style.left   = (lc.x - cellW * 0.3) + "px";
        lbl.style.top    = (lc.y - cellH * 0.12) + "px";

        drawGrid();
        document.getElementById("singleImage").style.display = "block";
        lbl.style.display = "block";
        await sleep(SHOW_SINGLE_MS);

        document.getElementById("singleImage").style.display = "none";
        lbl.style.display = "none";
        drawGrid();
        await sleep(GAP_BEFORE_PAIR);

        let leftFile, rightFile;
        if (Math.random() < 0.5) {
            leftFile = IMAGE_URLS[i2]; rightFile = IMAGE_URLS[i1]; correctSide = "right";
        } else {
            leftFile = IMAGE_URLS[i1]; rightFile = IMAGE_URLS[i2]; correctSide = "left";
        }

        placeAt("leftImage",  leftIdx);
        placeAt("rightImage", rightIdx);
        document.getElementById("leftImage").querySelector("img").src  = leftFile;
        document.getElementById("rightImage").querySelector("img").src = rightFile;

        drawGrid();
        document.getElementById("leftImage").style.display  = "block";
        document.getElementById("rightImage").style.display = "block";
        clickPhase = 1;
        gameActive = true;
    }

    function handleTap(clientX, clientY) {
        if (!gameActive) return;

        if (clickPhase === 1) {
            let leftEl  = document.getElementById("leftImage");
            let rightEl = document.getElementById("rightImage");
            let lr = leftEl.getBoundingClientRect();
            let rr = rightEl.getBoundingClientRect();

            let hitLeft  = clientX >= lr.left && clientX <= lr.right &&
                           clientY >= lr.top  && clientY <= lr.bottom;
            let hitRight = clientX >= rr.left && clientX <= rr.right &&
                           clientY >= rr.top  && clientY <= rr.bottom;
            if (!hitLeft && !hitRight) return;

            gameActive = false;
            let side = hitLeft ? "left" : "right";

            if (side !== correctSide) {
                leftEl.style.display = rightEl.style.display = "none";
                drawGrid();
                showFeedback("WRONG\nIMAGE");
                sleep(WRONG_IMG_MS).then(() => {
                    hideFeedback(); drawGrid(); sleep(300).then(phaseOne);
                });
            } else {
                let keepEl = side === "left" ? leftEl  : rightEl;
                let hideEl = side === "left" ? rightEl : leftEl;
                hideEl.style.display = "none";
                let r = keepEl.getBoundingClientRect();
                nameLabelX = r.left + 8;
                nameLabelY = r.bottom + 8;
                drawGrid();
                clickPhase = 2;
                gameActive = true;
            }
        }

        else if (clickPhase === 2) {
            gameActive = false;
            let region = getRegion(clientX, clientY);

            if (region === correctRegion) {
                let lb = document.getElementById("labelBelow");
                lb.textContent   = correctImgName;
                lb.style.left    = nameLabelX + "px";
                lb.style.top     = nameLabelY + "px";
                lb.style.maxWidth = Math.floor(cellW * 0.9) + "px";
                lb.style.display = "block";
                drawGrid();
                speak(correctImgName);
                sleep(CORRECT_FLASH_MS).then(() => {
                    lb.style.display = "none";
                    document.getElementById("leftImage").style.display  = "none";
                    document.getElementById("rightImage").style.display = "none";
                    drawGrid();
                    sleep(300).then(phaseOne);
                });
            } else {
                document.getElementById("leftImage").style.display  = "none";
                document.getElementById("rightImage").style.display = "none";
                drawGrid();
                showFeedback("WRONG");
                sleep(INCORRECT_MS).then(() => {
                    hideFeedback(); drawGrid(); sleep(300).then(phaseOne);
                });
            }
        }
    }

    document.addEventListener("click", e => handleTap(e.clientX, e.clientY));
    document.addEventListener("touchend", e => {
        e.preventDefault();
        let t = e.changedTouches[0];
        handleTap(t.clientX, t.clientY);
    }, { passive: false });

    window.addEventListener("resize", () => { recalc(); drawGrid(); });
    window.addEventListener("orientationchange", () => {
        setTimeout(() => { recalc(); drawGrid(); }, 350);
    });

    recalc();
    drawGrid();
    phaseOne();
</script>
</body>
</html>
