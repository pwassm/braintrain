<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Brain Training</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; touch-action: manipulation; background: #000; }
#rotateWrap { position: fixed; top: 0; left: 0; }
#gameCanvas { display: block; }

#debugTimestamp {
    position: absolute; top: 10px; left: 10px; z-index: 9999;
    color: #ff0; font: bold 16px monospace; background: rgba(0,0,0,0.8);
    padding: 6px 12px; border-radius: 6px; border: 2px solid #ff0;
    pointer-events: none;
}

#menuWrap { position: fixed; z-index: 999; width: 48px; height: 48px; }
#menuWrap.portrait-mode { transform: rotate(90deg); transform-origin: 24px 24px; }
#menuBtn {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(30,30,30,0.82); border: none; border-radius: 10px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 10px; touch-action: manipulation;
}
#menuBtn.open { background: rgba(30,30,30,0.97); }
#menuBtn span { display: block; width: 100%; height: 3px; background: #fff; border-radius: 2px; }

#menuPanel {
    position: absolute; bottom: 54px; right: 0; z-index: 998;
    background: rgba(25,25,25,0.96); border-radius: 10px;
    overflow-y: auto; max-height: 80vh;
    display: none; flex-direction: column; min-width: 200px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.3) transparent;
}
#menuPanel::-webkit-scrollbar { width: 6px; }
#menuPanel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }
#menuPanel.open { display: flex; }

.menu-item {
    padding: 13px 18px; color: #fff; font: 15px Arial, sans-serif;
    cursor: pointer; white-space: nowrap; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:hover, .menu-item:active { background: rgba(255,255,255,0.12); }
.menu-item.active-set { color: #6f6; }
.menu-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 2px 0; flex-shrink: 0; }

.video-sub, .ytimg-sub, .ttvid-sub, .ttytimg-sub {
    padding: 10px 18px 10px 30px; font: 14px Arial, sans-serif; cursor: pointer; white-space: nowrap;
    border-bottom: 1px solid rgba(255,255,255,0.05); display: none; flex-shrink: 0;
}
.video-sub   { color: #8ef; }
.ytimg-sub   { color: #f88; }
.ttvid-sub   { color: #afa; }
.ttytimg-sub { color: #fc8; }
.video-sub.visible, .ytimg-sub.visible,
.ttvid-sub.visible, .ttytimg-sub.visible { display: block; }
.video-sub:hover,   .video-sub:active   { background: rgba(100,200,255,0.1); }
.ytimg-sub:hover,   .ytimg-sub:active   { background: rgba(255,100,100,0.1); }
.ttvid-sub:hover,   .ttvid-sub:active   { background: rgba(100,255,100,0.1); }
.ttytimg-sub:hover, .ttytimg-sub:active  { background: rgba(255,200,100,0.1); }

#videoWrap { display: none; position: absolute; z-index: 10; overflow: hidden; }
#videoWrap.open { display: block; }
#ytDiv { position: absolute; top: 0; left: 0; pointer-events: auto; }

.yt-game-wrap {
    position: absolute; z-index: 10;
    overflow: hidden; background: #000;
    border: 2px solid #333; box-sizing: border-box;
    visibility: hidden;
}
.yt-game-wrap iframe { position: absolute; pointer-events: none; border: 0; }
.yt-cover { position: absolute; inset: 0; background: #000; z-index: 5; transition: none; }
.yt-hitbox { position: absolute; inset: 0; z-index: 6; cursor: pointer; }

#closeVideoBtn {
    position: absolute; top: 4px; right: 4px; z-index: 20;
    background: rgba(20,20,20,0.85); color: #fff; border: none; border-radius: 6px;
    font-size: 16px; width: 28px; height: 28px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; touch-action: manipulation;
}

/* ── Video Manager overlay ───────────────────────────────────────── */
#vmOverlay {
    display: none; position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.88); flex-direction: column;
    font-family: Arial, sans-serif; color: #fff;
}
#vmOverlay.open { display: flex; }

#vmHeader {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; background: #1a1a2e; flex-shrink: 0;
    border-bottom: 1px solid #333; flex-wrap: wrap;
}
#vmHeader h2 { font-size: 16px; color: #8ef; margin-right: 6px; }

.vm-tab {
    padding: 5px 14px; border-radius: 6px; cursor: pointer;
    background: #2a2a3e; border: 1px solid #444; font-size: 13px; color: #ccc;
}
.vm-tab.active { background: #3a5a8a; border-color: #8ef; color: #fff; }
.vm-tab:hover { background: #3a3a5e; }

#vmToolbar {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; background: #111122; flex-shrink: 0;
    border-bottom: 1px solid #333; flex-wrap: wrap;
}
.vm-btn {
    padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px;
    border: 1px solid #555; background: #2a2a3e; color: #ddd;
    white-space: nowrap;
}
.vm-btn:hover { background: #3a3a5e; border-color: #8ef; color: #fff; }
.vm-btn.danger { border-color: #f55; color: #f88; }
.vm-btn.danger:hover { background: #3e1a1a; }
.vm-btn.success { border-color: #5f5; color: #afa; }
.vm-btn.success:hover { background: #1a3e1a; }

#vmSelInfo { margin-left: auto; font-size: 12px; color: #888; white-space: nowrap; }

#vmTableWrap {
    flex: 1; overflow: auto;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.3) transparent;
}
#vmTableWrap::-webkit-scrollbar { width: 7px; height: 7px; }
#vmTableWrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 4px; }

#vmTable {
    border-collapse: collapse; width: 100%; min-width: 600px;
    font-size: 13px;
}
#vmTable th {
    position: sticky; top: 0; background: #1e1e3a; color: #8ef;
    padding: 8px 10px; text-align: left; white-space: nowrap;
    border-bottom: 2px solid #444; user-select: none; cursor: pointer;
    z-index: 2;
}
#vmTable th:hover { background: #2a2a5a; }
#vmTable th.sort-asc::after  { content: " ▲"; font-size: 10px; }
#vmTable th.sort-desc::after { content: " ▼"; font-size: 10px; }
#vmTable th.no-sort { cursor: default; }

#vmTable td {
    padding: 6px 10px; border-bottom: 1px solid #222;
    vertical-align: middle; white-space: nowrap;
}
#vmTable tr.vm-row { cursor: pointer; }
#vmTable tr.vm-row:hover td { background: rgba(255,255,255,0.05); }
#vmTable tr.vm-row.selected td { background: rgba(58,90,138,0.55); }

#vmTable td.editable { cursor: text; }
#vmTable td.editable:hover { background: rgba(100,200,255,0.08) !important; outline: 1px dashed #8ef4; }
#vmTable input.vm-cell-input {
    background: #0a0a1a; border: 1px solid #8ef; color: #fff;
    padding: 2px 5px; border-radius: 3px; font-size: 13px;
    width: 100%; min-width: 60px;
}
#vmTable select.vm-cell-input {
    background: #0a0a1a; border: 1px solid #8ef; color: #fff;
    padding: 2px 4px; border-radius: 3px; font-size: 13px;
}

/* rating stars */
.vm-stars { color: #fc8; cursor: pointer; font-size: 15px; letter-spacing: 2px; }

/* action cell buttons */
.vm-action-btn {
    padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;
    border: 1px solid #555; background: #1e1e2e; color: #ccc; margin: 0 2px;
}
.vm-action-btn:hover { background: #2e2e5e; border-color: #8ef; color: #fff; }

/* Field Manager panel */
#vmFieldPanel {
    display: none; padding: 14px 18px; background: #111122;
    border-top: 1px solid #333; flex-shrink: 0; flex-wrap: wrap; gap: 10px;
}
#vmFieldPanel.open { display: flex; align-items: flex-start; }
#vmFieldPanel h3 { width: 100%; font-size: 14px; color: #fc8; margin-bottom: 6px; }

.vm-field-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px; font-size: 12px;
    border: 1px solid #555; background: #2a2a3e; color: #ddd;
    cursor: grab; user-select: none;
}
.vm-field-chip.active-field { border-color: #5f5; color: #afa; background: #1a3a1a; }
.vm-field-chip .chip-toggle { cursor: pointer; font-size: 14px; }
.vm-field-chip.dragging { opacity: 0.4; }
.vm-field-chip.drag-over { border-color: #fc8; background: #3a2a0a; }

#vmFieldPanel .vm-btn { align-self: center; }

/* status bar */
#vmStatus {
    padding: 5px 14px; font-size: 11px; color: #888;
    background: #0a0a1a; border-top: 1px solid #222; flex-shrink: 0;
    display: flex; justify-content: space-between;
}
#vmStatus span { color: #afa; }
</style>
</head>
<body>

<div id="debugTimestamp"></div>

<div id="rotateWrap">
    <canvas id="gameCanvas"></canvas>
    <div id="videoWrap">
        <div id="ytDiv"></div>
        <button id="closeVideoBtn">X</button>
    </div>
    <div id="ytGameCenter" class="yt-game-wrap"></div>
    <div id="ytGameLeft"   class="yt-game-wrap"></div>
    <div id="ytGameRight"  class="yt-game-wrap"></div>
</div>

<div id="menuWrap">
    <div id="menuPanel">
        <div class="menu-item" id="miPlay">Play Video</div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="miYTasImage">YTpix</div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="miPlayTT">PlayTT</div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="miConfig">Config / Manager</div>
        <div class="menu-item" id="miHelp">Help</div>
        <div class="menu-divider"></div>
    </div>
    <button id="menuBtn"><span></span><span></span><span></span></button>
</div>

<!-- ── Video Manager Overlay ──────────────────────────────────────── -->
<div id="vmOverlay">
    <div id="vmHeader">
        <h2>📋 Video Manager</h2>
        <div id="vmTabs"></div>
        <button class="vm-btn" id="vmCloseBtn" style="margin-left:auto">✕ Close</button>
    </div>
    <div id="vmToolbar">
        <button class="vm-btn" id="vmPlaySelBtn">▶ Play</button>
        <button class="vm-btn" id="vmYTpixSelBtn">🎯 YTpix</button>
        <button class="vm-btn success" id="vmExportBtn">⬇ Export JSON</button>
        <button class="vm-btn danger"  id="vmResetBtn">↺ Reset</button>
        <button class="vm-btn" id="vmFieldToggleBtn">⚙ Fields</button>
        <div id="vmSelInfo">0 selected</div>
    </div>
    <div id="vmFieldPanel">
        <h3>Column Fields — drag to reorder, click ● to toggle visibility</h3>
    </div>
    <div id="vmTableWrap">
        <table id="vmTable">
            <thead><tr id="vmThead"></tr></thead>
            <tbody id="vmTbody"></tbody>
        </table>
    </div>
    <div id="vmStatus">
        <div id="vmStatusLeft">No data loaded</div>
        <div id="vmStatusRight">localStorage: <span id="vmLsInfo">—</span></div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
document.getElementById("debugTimestamp").innerText = new Date().toLocaleString();

// -- constants --------------------------------------------------------------
const GRID_COLS=5,GRID_ROWS=5,GRID_LINES=4,IMG_PAD=6;
const SHOW_SINGLE_MS=1000,GAP_BEFORE_PAIR=500,CORRECT_FLASH_MS=1500;
const INCORRECT_MS=3000,WRONG_IMG_MS=500;
const COVER_SETTLE_MS=300;

// -- layout globals ---------------------------------------------------------
let GW,GH,cellW,cellH,imgW,imgH,isPortrait,bgColor;
const canvas=document.getElementById("gameCanvas"),ctx=canvas.getContext("2d");
const wrap=document.getElementById("rotateWrap");
const menuWrap=document.getElementById("menuWrap"),menuBtn=document.getElementById("menuBtn"),menuPanel=document.getElementById("menuPanel");

// -- asset/game state -------------------------------------------------------
let IMAGE_URLS=[],IMAGE_NAMES=[],AUDIO_FILES=[],allSets=[],activeSetIndex=0,allVideos=[],allTTVideos=[];
let loadedImages=[],clickPhase=0,correctRegion=0,correctImgName="",correctImgIndex=0,correctSide="",gameActive=false;
let slots={single:null,left:null,right:null},slotImg={single:null,left:null,right:null},slotVis={single:false,left:false,right:false};
let bigSlot=null,bigImg=null,bigVis=false,hintVisible=false,hintImg=null,hintRegion=0;
let nameBelowVisible=false,nameBelowText="",feedbackVisible=false,feedbackText="",currentAudio=null;

// -- YTpix state ------------------------------------------------------------
let isYTGameMode=false,ytGameVideo=null,ytGameReadyCount=0;
let ytPlayers={center:null,left:null,right:null};
let playExpanded=false,ytimgExpanded=false,ttExpanded=false;
let ytAPIReady=false;
window.onYouTubeIframeAPIReady=()=>{ ytAPIReady=true; };

const centerIdx=((Math.ceil(GRID_ROWS/2)-1)*GRID_COLS)+Math.ceil(GRID_COLS/2);
const leftIdx=centerIdx-1,rightIdx=centerIdx+1;

const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const rnd=n=>Math.floor(Math.random()*n);
function afterTwoPaints(cb){ requestAnimationFrame(()=>requestAnimationFrame(cb)); }

// -- crop -------------------------------------------------------------------
function applyCrop(iframe,crop){
    if(!iframe) return;
    const [cL,cT,cR,cB]=crop||[0,0,1,1];
    const cw=Math.max(cR-cL,0.01),ch=Math.max(cB-cT,0.01);
    iframe.style.width=(100/cw)+"%"; iframe.style.height=(100/ch)+"%";
    iframe.style.left=-(cL*100/cw)+"%"; iframe.style.top=-(cT*100/ch)+"%";
}

function buildSlotHTML(wrapId,playerDivId,coverId,hitId){
    const w=document.getElementById(wrapId);
    w.innerHTML=`<div id="${playerDivId}"></div><div class="yt-cover" id="${coverId}"></div>`
               +(hitId?`<div class="yt-hitbox" id="${hitId}"></div>`:"");
}
function positionWrap(id,rect){
    const el=document.getElementById(id);
    el.style.left=rect.x+"px"; el.style.top=rect.y+"px";
    el.style.width=rect.w+"px"; el.style.height=rect.h+"px";
    el.style.display="block"; el.style.visibility="hidden";
}

function createFreezePlayer(divId,key,targetTime,vid,onReady){
    if(ytPlayers[key]){ ytPlayers[key].destroy(); ytPlayers[key]=null; }
    let revealed=false;
    function revealNow(){
        if(revealed) return; revealed=true;
        afterTwoPaints(()=>{
            setTimeout(()=>{
                const cover=document.getElementById("cover_"+key);
                if(cover) cover.parentNode&&cover.parentNode.removeChild(cover);
                onReady();
            },COVER_SETTLE_MS);
        });
    }
    ytPlayers[key]=new YT.Player(divId,{
        videoId:vid.id,
        playerVars:{autoplay:1,controls:0,disablekb:1,modestbranding:1,rel:0,showinfo:0,mute:1,start:targetTime,playsinline:1},
        events:{
            onReady(e){ e.target.mute(); applyCrop(e.target.getIframe(),vid.crop); },
            onStateChange(e){
                applyCrop(e.target.getIframe(),vid.crop);
                if(e.data===YT.PlayerState.PLAYING) e.target.pauseVideo();
                else if(e.data===YT.PlayerState.PAUSED) revealNow();
            }
        }
    });
}

// -- YTpix game -------------------------------------------------------------
function startYTGame(vid){
    if(!ytAPIReady){ setTimeout(()=>startYTGame(vid),300); return; }
    if(videoOpen) closeVideo();
    vmStampLastUsed(vid);
    isYTGameMode=true; ytGameVideo=vid; gameActive=false; clickPhase=0;
    setupLayout(); renderGridOnly();
    const makeR=idx=>{ const c=getCenter(idx); return{x:Math.floor(c.x-imgW/2),y:Math.floor(c.y-imgH/2),w:imgW,h:imgH}; };
    slots.single=makeR(centerIdx); slots.left=makeR(leftIdx); slots.right=makeR(rightIdx);
    buildSlotHTML("ytGameCenter","ytPlayerCenter","cover_center",null);
    buildSlotHTML("ytGameLeft",  "ytPlayerLeft",  "cover_left",  "ytHitLeft");
    buildSlotHTML("ytGameRight", "ytPlayerRight", "cover_right", "ytHitRight");
    positionWrap("ytGameCenter",slots.single);
    positionWrap("ytGameLeft",  slots.left);
    positionWrap("ytGameRight", slots.right);
    ytGameReadyCount=0;
    correctSide=Math.random()<0.5?"right":"left";
    const timeT=vid.start||0, tdiff=vid.tdiff!==undefined?vid.tdiff:4, timeT2=timeT+tdiff;
    function slotReady(){ ytGameReadyCount++; if(ytGameReadyCount===3) startYTGamePhase1(); }
    createFreezePlayer("ytPlayerCenter","center",timeT,vid,slotReady);
    if(correctSide==="right"){
        createFreezePlayer("ytPlayerRight","right",timeT, vid,slotReady);
        createFreezePlayer("ytPlayerLeft", "left", timeT2,vid,slotReady);
    } else {
        createFreezePlayer("ytPlayerLeft", "left", timeT, vid,slotReady);
        createFreezePlayer("ytPlayerRight","right",timeT2,vid,slotReady);
    }
    document.getElementById("ytHitLeft").onpointerup =e=>handleYTTap("left",e);
    document.getElementById("ytHitRight").onpointerup=e=>handleYTTap("right",e);
}
async function startYTGamePhase1(){
    ["ytGameCenter","ytGameLeft","ytGameRight"].forEach(id=>{ document.getElementById(id).style.visibility="visible"; });
    document.getElementById("ytGameLeft").style.display="none";
    document.getElementById("ytGameRight").style.display="none";
    document.getElementById("ytGameCenter").style.display="block";
    await sleep(SHOW_SINGLE_MS);
    document.getElementById("ytGameCenter").style.display="none";
    await sleep(GAP_BEFORE_PAIR);
    document.getElementById("ytGameLeft").style.display="block";
    document.getElementById("ytGameRight").style.display="block";
    clickPhase=1; gameActive=true;
}
function handleYTTap(side,e){
    if(!gameActive||clickPhase!==1) return;
    e.stopPropagation(); gameActive=false;
    if(side!==correctSide){
        document.getElementById("ytGameLeft").style.display="none";
        document.getElementById("ytGameRight").style.display="none";
        feedbackText="WRONG\nFRAME"; feedbackVisible=true; renderGridOnly(); drawFeedback(feedbackText);
        sleep(WRONG_IMG_MS).then(()=>{ feedbackVisible=false; renderGridOnly(); sleep(300).then(()=>startYTGame(ytGameVideo)); });
    } else {
        document.getElementById("ytGameLeft").style.display="none";
        document.getElementById("ytGameRight").style.display="none";
        document.getElementById("ytGameCenter").style.display="block";
        sleep(CORRECT_FLASH_MS).then(()=>{ document.getElementById("ytGameCenter").style.display="none"; sleep(300).then(()=>startYTGame(ytGameVideo)); });
    }
}
function stopYTGameMode(){
    isYTGameMode=false;
    ["ytGameCenter","ytGameLeft","ytGameRight"].forEach(id=>{ const el=document.getElementById(id); el.style.display="none"; el.style.visibility="hidden"; });
    ["center","left","right"].forEach(k=>{ if(ytPlayers[k]){ ytPlayers[k].destroy(); ytPlayers[k]=null; } });
}

// -- video playback ---------------------------------------------------------
const videoWrap=document.getElementById("videoWrap"),closeVideoBtn=document.getElementById("closeVideoBtn");
let ytPlayer=null,loopInterval=null,seekDebounce=false,currentVideo=null,videoOpen=false;

function positionVideoWrap(){
    if(!currentVideo) return{ifW:0,ifH:0,ifX:0,ifY:0};
    const isL=(currentVideo.isLandscape==1||currentVideo.isLandscape===true);
    let wrapX,wrapY,wrapW,wrapH,ifW,ifH,ifX=0,ifY=0;
    if(isL){
        const boxX=cellW,boxY=cellH,boxW=cellW*3,boxH=cellH*3,scale=Math.min(boxW/16,boxH/9);
        wrapW=Math.floor(16*scale); wrapH=Math.floor(9*scale);
        wrapX=Math.floor(boxX+(boxW-wrapW)/2); wrapY=Math.floor(boxY+(boxH-wrapH)/2);
        ifW=wrapW; ifH=wrapH;
    } else {
        wrapX=Math.floor(cellW*2); wrapY=Math.floor(cellH); wrapW=Math.floor(cellW); wrapH=Math.floor(cellH*3);
        ifH=wrapH; ifW=Math.round(ifH*16/9); ifX=Math.round((wrapW-ifW)/2);
    }
    videoWrap.style.cssText=`left:${wrapX}px;top:${wrapY}px;width:${wrapW}px;height:${wrapH}px;`;
    if(ytPlayer&&ytPlayer.getIframe){try{const f=ytPlayer.getIframe();if(f){f.style.position="absolute";f.style.width=ifW+"px";f.style.height=ifH+"px";f.style.left=ifX+"px";f.style.top=ifY+"px";}}catch(e){}}
    return{ifW,ifH,ifX,ifY};
}
function openVideo(vid){
    if(isYTGameMode) stopYTGameMode();
    vmStampLastUsed(vid);
    currentVideo=vid; videoOpen=true; gameActive=false; setupLayout();
    const dims=positionVideoWrap(); videoWrap.classList.add("open"); renderGridOnly();
    if(ytPlayer){ positionVideoWrap(); ytPlayer.loadVideoById({videoId:vid.id,startSeconds:vid.start||0}); vid.mute?ytPlayer.mute():ytPlayer.unMute(); startLoopWatcher(); return; }
    if(!ytAPIReady){ setTimeout(()=>openVideo(vid),300); return; }
    ytPlayer=new YT.Player("ytDiv",{width:dims.ifW,height:dims.ifH,videoId:vid.id,
        playerVars:{autoplay:1,start:vid.start||0,controls:0,rel:0,modestbranding:1,playsinline:1,enablejsapi:1,mute:vid.mute?1:0},
        events:{
            onReady(e){ positionVideoWrap(); if(vid.mute)e.target.mute(); e.target.playVideo(); startLoopWatcher(); },
            onStateChange(e){ if(e.data===YT.PlayerState.ENDED)doSeekLoop(); }
        }
    });
}
function doSeekLoop(){ if(!currentVideo||seekDebounce)return; seekDebounce=true; ytPlayer.seekTo(currentVideo.start||0,true); ytPlayer.playVideo(); setTimeout(()=>{seekDebounce=false;},800); }
function startLoopWatcher(){ if(loopInterval)clearInterval(loopInterval); loopInterval=setInterval(()=>{ if(!videoOpen||!ytPlayer||typeof ytPlayer.getCurrentTime!=="function")return; try{if(!currentVideo||!currentVideo.end)return;const t=ytPlayer.getCurrentTime();if(!seekDebounce&&t>=currentVideo.end)doSeekLoop();}catch(e){}},250); }
function closeVideo(){ videoOpen=false; videoWrap.classList.remove("open"); if(loopInterval){clearInterval(loopInterval);loopInterval=null;} if(ytPlayer&&ytPlayer.pauseVideo)ytPlayer.pauseVideo(); currentVideo=null; render(); }
closeVideoBtn.addEventListener("pointerup",e=>{e.stopPropagation();closeVideo();});

// -- canvas rendering -------------------------------------------------------
function renderGridOnly(){
    ctx.fillStyle=bgColor; ctx.fillRect(0,0,GW,GH);
    ctx.strokeStyle="#000"; ctx.lineWidth=1;
    for(let i=1;i<=GRID_LINES;i++){const x=GW*i/(GRID_LINES+1);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,GH);ctx.stroke();}
    for(let i=1;i<=GRID_LINES;i++){const y=GH*i/(GRID_LINES+1);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(GW,y);ctx.stroke();}
}
function drawImg(img,r){ctx.save();ctx.beginPath();ctx.rect(r.x,r.y,r.w,r.h);ctx.clip();ctx.drawImage(img,r.x,r.y,r.w,r.h);ctx.restore();ctx.strokeStyle="#333";ctx.lineWidth=2;ctx.strokeRect(r.x,r.y,r.w,r.h);}
function drawBigImg(img,r){ctx.drawImage(img,r.x,r.y,r.w,r.h);ctx.strokeStyle="#333";ctx.lineWidth=2;ctx.strokeRect(r.x,r.y,r.w,r.h);}
function drawHint(img,regionIdx){const c=getCenter(regionIdx);const tw=Math.floor(imgW*0.20),th=Math.floor(imgH*0.20);const tx=Math.floor(c.x-tw/2),ty=Math.floor(c.y-th/2);ctx.drawImage(img,tx,ty,tw,th);ctx.strokeStyle="rgba(0,0,0,0.6)";ctx.lineWidth=1;ctx.strokeRect(tx,ty,tw,th);}
function drawFittedLabel(text,cx,cy,maxW,maxH,bg,fg){let pad=10,fs=Math.floor(maxH*0.275);ctx.font="bold "+fs+"px Arial";while(fs>4&&ctx.measureText(text).width>maxW-pad*2){fs--;ctx.font="bold "+fs+"px Arial";}const tw=ctx.measureText(text).width,bw=tw+pad*2,bh=fs+pad*2;const bx=Math.max(2,Math.min(cx-bw/2,GW-bw-2)),by=Math.max(2,Math.min(cy-bh/2,GH-bh-2));ctx.fillStyle=bg;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(bx,by,bw,bh,6);else ctx.rect(bx,by,bw,bh);ctx.fill();ctx.fillStyle=fg;ctx.fillText(text,bx+pad,by+pad+fs*0.85);}
function drawFeedback(text){const fs=Math.max(12,Math.floor(GH/10));ctx.font="bold "+fs+"px Arial";const lines=text.split("\n");let maxW=0;lines.forEach(l=>{const m=ctx.measureText(l).width;if(m>maxW)maxW=m;});const pad=24,bw=maxW+pad*2,bh=(fs+10)*lines.length+pad*2;const bx=GW/2-bw/2,by=GH/2-bh/2;ctx.fillStyle="rgba(255,60,60,0.97)";ctx.beginPath();if(ctx.roundRect)ctx.roundRect(bx,by,bw,bh,10);else ctx.rect(bx,by,bw,bh);ctx.fill();ctx.fillStyle="#fff";lines.forEach((l,i)=>ctx.fillText(l,GW/2-ctx.measureText(l).width/2,by+pad+fs*0.85+i*(fs+10)));}
function render(){
    if(videoOpen||isYTGameMode){renderGridOnly();return;}
    renderGridOnly();
    ["single","left","right"].forEach(k=>{if(slotVis[k]&&slotImg[k]&&slots[k])drawImg(slotImg[k],slots[k]);});
    if(bigVis&&bigImg&&bigSlot)drawBigImg(bigImg,bigSlot);
    if(hintVisible&&hintImg)drawHint(hintImg,hintRegion);
    if(nameBelowVisible){const z=getLabelZone();drawFittedLabel(nameBelowText,z.cx,z.cy,z.zoneW,z.zoneH,"rgba(60,180,60,0.97)","#fff");}
    if(feedbackVisible)drawFeedback(feedbackText);
}

// -- layout -----------------------------------------------------------------
function setupLayout(){
    const pw=window.innerWidth,ph=window.innerHeight;
    isPortrait=pw<ph; bgColor=Math.min(pw,ph)<600?"#7ab8e8":"#ffffff";
    if(isPortrait){GW=ph;GH=pw;canvas.width=GW;canvas.height=GH;wrap.style.width=GW+"px";wrap.style.height=GH+"px";wrap.style.transformOrigin="0 0";wrap.style.transform="rotate(90deg) translateY(-"+pw+"px)";}
    else{GW=pw;GH=ph;canvas.width=GW;canvas.height=GH;wrap.style.width=GW+"px";wrap.style.height=GH+"px";wrap.style.transformOrigin="0 0";wrap.style.transform="none";}
    cellW=GW/GRID_COLS; cellH=GH/GRID_ROWS;
    const maxW=cellW-IMG_PAD*2,maxH=cellH-IMG_PAD*2;
    if(maxW*9/16<=maxH){imgW=Math.floor(maxW);imgH=Math.floor(maxW*9/16);}else{imgH=Math.floor(maxH);imgW=Math.floor(maxH*16/9);}
    updateMenuPosition();
    if(videoOpen) positionVideoWrap();
}
function getCenter(idx){const row=Math.floor((idx-1)/GRID_COLS)+1,col=((idx-1)%GRID_COLS)+1;return{x:(col-0.5)*cellW,y:(row-0.5)*cellH};}
function getRegion(gx,gy){const col=Math.floor(gx/cellW)+1,row=Math.floor(gy/cellH)+1;if(col<1||col>GRID_COLS||row<1||row>GRID_ROWS)return 0;return(row-1)*GRID_COLS+col;}
function makeSlot(idx){const c=getCenter(idx);return{x:Math.floor(c.x-imgW/2),y:Math.floor(c.y-imgH/2),w:imgW,h:imgH};}
function makeBigSlot(img){const boxX=cellW,boxY=cellH,boxW=cellW*3,boxH=cellH*3;const iw=img.naturalWidth||boxW,ih=img.naturalHeight||boxH;const scale=Math.min(boxW/iw,boxH/ih);const dw=Math.floor(iw*scale),dh=Math.floor(ih*scale);return{x:Math.floor(boxX+(boxW-dw)/2),y:Math.floor(boxY+(boxH-dh)/2),w:dw,h:dh};}
function getLabelZone(){return{cx:cellW*2.5,cy:cellH*4.5,zoneW:cellW*3,zoneH:cellH};}
function toGame(px,py){if(isPortrait)return{x:py,y:window.innerWidth-px};return{x:px,y:py};}

// -- audio / image loading --------------------------------------------------
function playAudio(idx){return new Promise(resolve=>{if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;}const src=AUDIO_FILES[idx];if(!src){resolve();return;}currentAudio=new Audio(src);currentAudio.onended=resolve;currentAudio.onerror=resolve;currentAudio.play().catch(resolve);});}
function preloadImages(cb){if(!IMAGE_URLS.length){cb();return;}loadedImages=new Array(IMAGE_URLS.length);let n=0;IMAGE_URLS.forEach((url,i)=>{const img=new Image();img.onload=img.onerror=()=>{if(++n===IMAGE_URLS.length)cb();};img.src=url;loadedImages[i]=img;});}
function loadSet(set,cb){IMAGE_URLS=set.items.map(it=>`${set.folder}/${it.base}.jpg`);IMAGE_NAMES=set.items.map(it=>it.label);AUDIO_FILES=set.items.map(it=>`${set.folder}/${it.base}.mp3`);loadedImages=[];preloadImages(cb);}
function switchSet(i){closeMenu();if(i===activeSetIndex&&!isYTGameMode)return;if(isYTGameMode)stopYTGameMode();activeSetIndex=i;gameActive=false;if(videoOpen)closeVideo();buildMenuItems();loadSet(allSets[i],()=>{setupLayout();render();phaseOne();});}

// -- game phases ------------------------------------------------------------
async function phaseOne(){
    gameActive=false;clickPhase=0;setupLayout();bigVis=false;bigImg=null;bigSlot=null;nameBelowVisible=false;hintVisible=false;feedbackVisible=false;
    let i1=rnd(IMAGE_URLS.length),i2=rnd(IMAGE_URLS.length);while(i2===i1)i2=rnd(IMAGE_URLS.length);
    correctImgIndex=i1;correctImgName=IMAGE_NAMES[i1];correctRegion=Math.floor(Math.random()*GRID_ROWS*GRID_COLS)+1;
    slots.single=makeSlot(centerIdx);slotImg.single=loadedImages[i1];slotVis.single=true;slotVis.left=false;slotVis.right=false;
    hintImg=loadedImages[i1];hintRegion=correctRegion;hintVisible=true;
    render();await sleep(SHOW_SINGLE_MS);slotVis.single=false;hintVisible=false;render();await sleep(GAP_BEFORE_PAIR);
    if(Math.random()<0.5){slotImg.left=loadedImages[i2];slotImg.right=loadedImages[i1];correctSide="right";}else{slotImg.left=loadedImages[i1];slotImg.right=loadedImages[i2];correctSide="left";}
    slots.left=makeSlot(leftIdx);slots.right=makeSlot(rightIdx);slotVis.left=slotVis.right=true;render();clickPhase=1;gameActive=true;
}
async function handleCorrectLocation(){
    slotVis.left=false;slotVis.right=false;const img=loadedImages[correctImgIndex];bigSlot=makeBigSlot(img);bigImg=img;bigVis=true;nameBelowText=correctImgName;nameBelowVisible=true;render();
    await playAudio(correctImgIndex);await sleep(CORRECT_FLASH_MS);bigVis=false;nameBelowVisible=false;render();await sleep(300);phaseOne();
}
function hitTest(gx,gy,r){return r&&gx>=r.x&&gx<=r.x+r.w&&gy>=r.y&&gy<=r.y+r.h;}
function handleTap(px,py){
    if(!gameActive||videoOpen||isYTGameMode)return;
    const g=toGame(px,py),gx=g.x,gy=g.y;
    if(clickPhase===1){
        const hl=hitTest(gx,gy,slots.left),hr=hitTest(gx,gy,slots.right);if(!hl&&!hr)return;
        gameActive=false;const side=hl?"left":"right";
        if(side!==correctSide){slotVis.left=slotVis.right=false;feedbackText="WRONG\nIMAGE";feedbackVisible=true;render();sleep(WRONG_IMG_MS).then(()=>{feedbackVisible=false;render();sleep(300).then(phaseOne);});}
        else{if(side==="left")slotVis.right=false;else slotVis.left=false;render();clickPhase=2;gameActive=true;}
    } else if(clickPhase===2){
        gameActive=false;const region=getRegion(gx,gy);
        if(region===correctRegion)handleCorrectLocation();
        else{slotVis.left=slotVis.right=false;feedbackText="WRONG";feedbackVisible=true;render();sleep(INCORRECT_MS).then(()=>{feedbackVisible=false;render();sleep(300).then(phaseOne);});}
    }
}

// Each source: { key, label, filename, videos[] }
const vmSources=[];
let vmActiveIdx=0;       // which tab/source is shown
let vmSortCol=null;      // current sort column key
let vmSortAsc=true;
let vmSelected=new Set(); // selected row indices (into current source.videos)
let vmLastClick=-1;
let vmFieldPanelOpen=false;
let vmDragKey=null;

// Core fields always present; optional fields user can add/reorder
const VM_CORE_FIELDS=[
    {key:"label",  label:"Label",   editable:true,  type:"text"},
    {key:"id",     label:"YT ID",   editable:true,  type:"text"},
    {key:"start",  label:"Start",   editable:true,  type:"number"},
    {key:"end",    label:"End",     editable:true,  type:"number"},
    {key:"tdiff",  label:"Tdiff",   editable:true,  type:"number"},
];
const VM_OPTIONAL_FIELDS=[
    {key:"category", label:"Category", editable:true, type:"text",   optional:true},
    {key:"rating",   label:"Rating",   editable:true, type:"rating", optional:true},
    {key:"lastUsed", label:"Last Used",editable:false, type:"date",  optional:true},
];

// Per-source field config stored in vmSources[i].fieldConfig = [{key,visible}...]
function vmDefaultFieldConfig(){
    return [
        ...VM_CORE_FIELDS.map(f=>({key:f.key,visible:true})),
        ...VM_OPTIONAL_FIELDS.map(f=>({key:f.key,visible:false})),
    ];
}
function vmAllFieldDefs(){
    return [...VM_CORE_FIELDS,...VM_OPTIONAL_FIELDS];
}
function vmFieldDef(key){ return vmAllFieldDefs().find(f=>f.key===key)||{key,label:key,editable:true,type:"text"}; }

function vmGetSource(){ return vmSources[vmActiveIdx]||null; }
function vmGetVideos(){ const s=vmGetSource(); return s?s.videos:[]; }

// -- localStorage helpers ---------------------------------------------------
function vmLsKey(filename){ return "vmData_"+filename; }
function vmSaveLS(src){
    try{
        localStorage.setItem(vmLsKey(src.filename), JSON.stringify({videos:src.videos, fieldConfig:src.fieldConfig}));
        vmUpdateStatus();
    }catch(e){}
}
function vmLoadLS(src){
    try{
        const raw=localStorage.getItem(vmLsKey(src.filename));
        if(!raw) return false;
        const d=JSON.parse(raw);
        if(d.videos) src.videos=d.videos;
        if(d.fieldConfig) src.fieldConfig=d.fieldConfig;
        return true;
    }catch(e){ return false; }
}
function vmUpdateStatus(){
    let info="";
    vmSources.forEach(s=>{
        const raw=localStorage.getItem(vmLsKey(s.filename));
        if(raw) info+=s.label+" ✓  ";
    });
    document.getElementById("vmLsInfo").textContent=info||"none";
    const src=vmGetSource();
    if(src) document.getElementById("vmStatusLeft").textContent=
        src.label+" — "+src.videos.length+" videos";
}

// -- stamp LastUsed on a video ----------------------------------------------
function vmStampLastUsed(vid){
    vmSources.forEach(src=>{
        const v=src.videos.find(v=>v.id===vid.id&&v.label===vid.label);
        if(v){ v.lastUsed=new Date().toISOString().slice(0,16).replace("T"," "); vmSaveLS(src); }
    });
}

// -- open/close ------------------------------------------------------------
function vmOpen(){
    document.getElementById("vmOverlay").classList.add("open");
    vmRenderTabs();
    vmRenderFieldPanel();
    vmRenderTable();
    vmUpdateStatus();
}
function vmClose(){
    document.getElementById("vmOverlay").classList.remove("open");
}

// -- tabs ------------------------------------------------------------------
function vmRenderTabs(){
    const el=document.getElementById("vmTabs");
    el.innerHTML="";
    vmSources.forEach((src,i)=>{
        const b=document.createElement("button");
        b.className="vm-tab"+(i===vmActiveIdx?" active":"");

        el.appendChild(b);

// -- field panel -----------------------------------------------------------
function vmRenderFieldPanel(){
    const src=vmGetSource(); if(!src) return;
    const panel=document.getElementById("vmFieldPanel");
    panel.innerHTML='<h3>Column Fields — drag to reorder · click ●/○ to show/hide</h3>';

    src.fieldConfig.forEach((fc,idx)=>{
        const def=vmFieldDef(fc.key);
        const chip=document.createElement("span");
        chip.className="vm-field-chip"+(fc.visible?" active-field":"");
        chip.draggable=true;
        chip.dataset.key=fc.key;
        chip.innerHTML=`<span class="chip-toggle">${fc.visible?"●":"○"}</span> ${def.label}`;
        chip.addEventListener("click",()=>{
            fc.visible=!fc.visible; vmSaveLS(src); vmRenderFieldPanel(); vmRenderTable();
        });
        chip.addEventListener("dragstart",e=>{ vmDragKey=fc.key; chip.classList.add("dragging"); });
        chip.addEventListener("dragend",e=>{ chip.classList.remove("dragging"); vmDragKey=null; });
        chip.addEventListener("dragover",e=>{ e.preventDefault(); chip.classList.add("drag-over"); });
        chip.addEventListener("dragleave",()=>chip.classList.remove("drag-over"));
        chip.addEventListener("drop",e=>{
            e.preventDefault(); chip.classList.remove("drag-over");
            if(!vmDragKey||vmDragKey===fc.key) return;
            const fromIdx=src.fieldConfig.findIndex(x=>x.key===vmDragKey);
            const toIdx=src.fieldConfig.findIndex(x=>x.key===fc.key);
            if(fromIdx<0||toIdx<0) return;
            const [moved]=src.fieldConfig.splice(fromIdx,1);
            src.fieldConfig.splice(toIdx,0,moved);
            vmSaveLS(src); vmRenderFieldPanel(); vmRenderTable();
        });
        panel.appendChild(chip);
    });

    // Add optional field buttons for ones not yet in config
    const existingKeys=src.fieldConfig.map(f=>f.key);
    VM_OPTIONAL_FIELDS.forEach(of=>{
        if(!existingKeys.includes(of.key)){
            const btn=document.createElement("button");
            btn.className="vm-btn success"; btn.style.fontSize="12px";
            btn.textContent="+ "+of.label;
            btn.addEventListener("click",()=>{
                src.fieldConfig.push({key:of.key,visible:true});
                vmSaveLS(src); vmRenderFieldPanel(); vmRenderTable();
            });
            panel.appendChild(btn);
        }
    });
}

document.getElementById("vmFieldToggleBtn").addEventListener("click",()=>{
    vmFieldPanelOpen=!vmFieldPanelOpen;
    document.getElementById("vmFieldPanel").classList.toggle("open",vmFieldPanelOpen);
});

// -- table rendering -------------------------------------------------------
function vmVisibleFields(){
    const src=vmGetSource(); if(!src) return [];
    return src.fieldConfig.filter(fc=>fc.visible).map(fc=>vmFieldDef(fc.key));
}

function vmRenderTable(){
    const src=vmGetSource();
    const thead=document.getElementById("vmThead");
    const tbody=document.getElementById("vmTbody");
    thead.innerHTML=""; tbody.innerHTML="";
    if(!src||!src.videos.length){ tbody.innerHTML='<tr><td colspan="99" style="color:#888;padding:20px">No videos in this source.</td></tr>'; return; }

    const fields=vmVisibleFields();

    // Header
    const chkTh=document.createElement("th"); chkTh.className="no-sort"; chkTh.style.width="32px";
    const chkAll=document.createElement("input"); chkAll.type="checkbox"; chkAll.title="Select all";
    chkAll.addEventListener("change",()=>{ if(chkAll.checked) src.videos.forEach((_,i)=>vmSelected.add(i)); else vmSelected.clear(); vmRenderTable(); });
    chkTh.appendChild(chkAll); thead.appendChild(chkTh);

    fields.forEach(f=>{
        const th=document.createElement("th"); th.textContent=f.label;
        if(f.key===vmSortCol) th.classList.add(vmSortAsc?"sort-asc":"sort-desc");
        th.addEventListener("click",()=>{
            if(vmSortCol===f.key) vmSortAsc=!vmSortAsc; else{ vmSortCol=f.key; vmSortAsc=true; }
            vmSortVideos(src); vmRenderTable();
        });
        thead.appendChild(th);
    });
    const actTh=document.createElement("th"); actTh.className="no-sort"; actTh.textContent="Actions"; thead.appendChild(actTh);

    // Sort
    if(vmSortCol) vmSortVideos(src);

    // Rows
    src.videos.forEach((vid,i)=>{
        const tr=document.createElement("tr"); tr.className="vm-row"+(vmSelected.has(i)?" selected":"");

        // Checkbox cell
        const chkTd=document.createElement("td");
        const chk=document.createElement("input"); chk.type="checkbox"; chk.checked=vmSelected.has(i);
        chk.addEventListener("change",e=>{ e.stopPropagation(); if(chk.checked) vmSelected.add(i); else vmSelected.delete(i); vmUpdateSelInfo(); tr.classList.toggle("selected",vmSelected.has(i)); });
        chkTd.appendChild(chk); tr.appendChild(chkTd);

        // Row click for selection (Windows-style)
        tr.addEventListener("click",e=>{
            if(e.target.tagName==="INPUT"||e.target.tagName==="BUTTON"||e.target.tagName==="SELECT") return;
            if(e.shiftKey&&vmLastClick>=0){
                const lo=Math.min(i,vmLastClick),hi=Math.max(i,vmLastClick);
                for(let x=lo;x<=hi;x++) vmSelected.add(x);
            } else if(e.ctrlKey||e.metaKey){
                if(vmSelected.has(i)) vmSelected.delete(i); else vmSelected.add(i);
            } else {
                vmSelected.clear(); vmSelected.add(i);
            }
            vmLastClick=i; vmRenderTable();
        });
        tr.addEventListener("dblclick",()=>{ vmClose(); openVideo(vid); });

        // Data cells
        fields.forEach(f=>{
            const td=document.createElement("td");
            if(f.editable) td.className="editable";

            if(f.type==="rating"){
                td.className=""; // rating handled specially
                const val=vid[f.key]||0;
                const stars=document.createElement("span"); stars.className="vm-stars";
                stars.textContent="★".repeat(val)+"☆".repeat(5-val);
                stars.addEventListener("click",e=>{
                    e.stopPropagation();
                    // click position within span determines star count
                    const rect=stars.getBoundingClientRect();
                    const pct=(e.clientX-rect.left)/rect.width;
                    const newVal=Math.ceil(pct*5); vid[f.key]=newVal;
                    stars.textContent="★".repeat(newVal)+"☆".repeat(5-newVal);
                    vmSaveLS(src);
                });
                td.appendChild(stars);
            } else {
                const disp=vid[f.key]!==undefined?String(vid[f.key]):"";
                td.textContent=disp;
                if(f.editable){
                    td.addEventListener("click",e=>{ e.stopPropagation(); vmStartEdit(td,vid,f,src); });
                }
            }
            tr.appendChild(td);
        });

        // Actions cell
        const actTd=document.createElement("td");
        const bPlay=document.createElement("button"); bPlay.className="vm-action-btn"; bPlay.textContent="▶ Play";
        bPlay.addEventListener("click",e=>{ e.stopPropagation(); vmClose(); openVideo(vid); });
        const bYT=document.createElement("button"); bYT.className="vm-action-btn"; bYT.textContent="🎯 YTpix";
        bYT.addEventListener("click",e=>{ e.stopPropagation(); vmClose(); startYTGame(vid); });
        actTd.appendChild(bPlay); actTd.appendChild(bYT); tr.appendChild(actTd);

        tbody.appendChild(tr);
    });

    vmUpdateSelInfo();
}

function vmSortVideos(src){
    if(!vmSortCol) return;
    src.videos.sort((a,b)=>{
        let av=a[vmSortCol]??"", bv=b[vmSortCol]??"";
        if(!isNaN(parseFloat(av))&&!isNaN(parseFloat(bv))){ av=parseFloat(av); bv=parseFloat(bv); }
        else{ av=String(av).toLowerCase(); bv=String(bv).toLowerCase(); }
        return vmSortAsc?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);
    });
}

function vmUpdateSelInfo(){
    document.getElementById("vmSelInfo").textContent=
        vmSelected.size+" selected / "+vmGetVideos().length+" total";
}

// -- inline cell editing ---------------------------------------------------
function vmStartEdit(td,vid,field,src){
    if(td.querySelector("input,select")) return; // already editing
    const prev=td.textContent;
    td.textContent="";
    let inp;
    if(field.type==="number"){
        inp=document.createElement("input"); inp.type="number"; inp.step="0.1";
        inp.value=vid[field.key]!==undefined?vid[field.key]:"";
    } else {
        inp=document.createElement("input"); inp.type="text";
        inp.value=vid[field.key]!==undefined?vid[field.key]:"";
    }
    inp.className="vm-cell-input";
    function commit(){
        let val=inp.value.trim();
        if(field.type==="number"){ val=val===""?undefined:parseFloat(val); }
        if(val===undefined) delete vid[field.key]; else vid[field.key]=val;
        vmSaveLS(src);
        // sync back to allVideos/allTTVideos so hamburger menu reflects changes
        vmSyncToRuntime(src);
        td.textContent=val!==undefined?String(val):"";
        td.className="editable";
        // rebuild menus so label changes appear
        buildVideoMenus(); buildTTMenus();
    }
    inp.addEventListener("blur",commit);
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); inp.blur(); } if(e.key==="Escape"){ td.textContent=prev; } });
    td.appendChild(inp); inp.focus(); inp.select();
}

// Sync edited vmSource videos back into allVideos / allTTVideos
function vmSyncToRuntime(src){
    if(src.filename==="yt.json") allVideos=src.videos;
    else if(src.filename==="@PechPongTT.short.json") allTTVideos=src.videos;
}

// -- toolbar actions -------------------------------------------------------
document.getElementById("vmPlaySelBtn").addEventListener("click",()=>{
    const src=vmGetSource(); if(!src) return;
    const idxs=[...vmSelected];
    if(!idxs.length){ alert("Select at least one video first."); return; }
    vmClose(); openVideo(src.videos[idxs[0]]);
});
document.getElementById("vmYTpixSelBtn").addEventListener("click",()=>{
    const src=vmGetSource(); if(!src) return;
    const idxs=[...vmSelected];
    if(!idxs.length){ alert("Select at least one video first."); return; }
    vmClose(); startYTGame(src.videos[idxs[0]]);
});
document.getElementById("vmExportBtn").addEventListener("click",()=>{
    const src=vmGetSource(); if(!src) return;
    const blob=new Blob([JSON.stringify({videos:src.videos},null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=src.filename; a.click(); URL.revokeObjectURL(a.href);
});
document.getElementById("vmResetBtn").addEventListener("click",()=>{
    const src=vmGetSource(); if(!src) return;
    if(!confirm("Reset '"+src.label+"' to last fetched data? localStorage override will be cleared.")) return;
    localStorage.removeItem(vmLsKey(src.filename));
    src.videos=JSON.parse(JSON.stringify(src._original));
    src.fieldConfig=vmDefaultFieldConfig();
    vmSyncToRuntime(src); buildVideoMenus(); buildTTMenus();
    vmRenderFieldPanel(); vmRenderTable(); vmUpdateStatus();
});

// ═══════════════════════════════════════════════════════════════════
// BOOTSTRAP
// ═══════════════════════════════════════════════════════════════════
Promise.all([
    fetch("assets.json?v="+Date.now()).then(r=>r.json()),
    fetch("yt.json?v="+Date.now()).then(r=>r.json()).catch(()=>({videos:[]})),
    fetch("@PechPongTT.short.json?v="+Date.now()).then(r=>r.json()).catch(()=>({videos:[]}))
]).then(([assetData,ytData,ttData])=>{
    allSets=assetData.sets||[]; allVideos=ytData.videos||[]; allTTVideos=ttData.videos||[];
    if(!allSets.length) throw new Error("No sets in assets.json");

    // Register VM sources
    vmSources.length=0;
    [{label:"YT Videos",filename:"yt.json",videos:allVideos},
     {label:"PlayTT",   filename:"@PechPongTT.short.json",videos:allTTVideos}
    ].forEach(s=>{
        const src={...s, _original:JSON.parse(JSON.stringify(s.videos)), fieldConfig:vmDefaultFieldConfig()};
        // Try loading localStorage overrides
        vmLoadLS(src);
        vmSyncToRuntime(src);
        vmSources.push(src);
    });

    activeSetIndex=0; buildMenuItems(); buildVideoMenus(); buildTTMenus();
    loadSet(allSets[0],()=>{setupLayout();render();phaseOne();});
}).catch(err=>{
    console.error(err); setupLayout();
    ctx.fillStyle="#fff"; ctx.fillRect(0,0,GW||400,GH||300);
    ctx.fillStyle="#c00"; ctx.font="bold 18px Arial";
    ctx.fillText("Error: "+err.message,20,(GH||300)/2);
});
</script>
