<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brain Training</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
            background-color: #5ba3d9;
        }
        #gameContainer {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background-color: #5ba3d9;
        }
        /* Single canvas does everything: background, grid, images, labels */
        #gameCanvas {
            position: absolute;
            top: 0; left: 0;
        }
        #feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 60, 60, 0.97);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            font-weight: bold;
            text-align: center;
            white-space: pre-line;
            display: none;
            z-index: 300;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="feedback"></div>
</div>

<script>
    // ============================================================
    const IMAGE_URLS = [
        "images/Garabaldi-Tiny.jpg",
        "images/Red-Phalarope.jpg",
        "images/Red-neck-Phalarope.jpg"
    ];
    const IMAGE_NAMES = [
        "Garibaldi",
        "Red Phalarope",
        "Red-necked Phalarope"
    ];
    // ============================================================

    const GRID_LINES       = 4;
    const GRID_COLS        = GRID_LINES + 1;
    const GRID_ROWS        = GRID_LINES + 1;
    const SHOW_SINGLE_MS   = 1000;
    const GAP_BEFORE_PAIR  = 500;
    const CORRECT_FLASH_MS = 3000;
    const INCORRECT_MS     = 3000;
    const WRONG_IMG_MS     = 500;
    const IMG_PAD          = 6;
    const BG_COLOR         = "#5ba3d9";

    let canvas = document.getElementById("gameCanvas");
    let ctx    = canvas.getContext("2d");
    let W, H, cellW, cellH, imgW, imgH, doRotate;

    // Preloaded image objects
    let loadedImages = [];

    // Game state
    let clickPhase = 0, correctRegion = 0, correctImgName = "";
    let correctSide = "", nameLabelX = 0, nameLabelY = 0, gameActive = false;
    let shownIdx1, shownIdx2;

    // Image slot positions (pixel rects on canvas)
    let slots = { single: null, left: null, right: null };
    // Which loaded image is in each slot
    let slotImg = { single: null, left: null, right: null };
    // Which slots are visible
    let slotVis = { single: false, left: false, right: false };

    // Label state
    let labelText = "", labelX = 0, labelY = 0, labelVisible = false;
    let nameBelowText = "", nameBelowX = 0, nameBelowY = 0, nameBelowVisible = false;

    // ---- Preload all images first ----
    function preloadImages(callback) {
        let loaded = 0;
        loadedImages = [];
        IMAGE_URLS.forEach((url, i) => {
            let img = new Image();
            img.onload = () => {
                loaded++;
                if (loaded === IMAGE_URLS.length) callback();
            };
            img.onerror = () => { loaded++; if (loaded === IMAGE_URLS.length) callback(); };
            img.src = url;
            loadedImages[i] = img;
        });
    }

    function recalc() {
        let container = document.getElementById("gameContainer");
        W = container.clientWidth;
        H = container.clientHeight;
        canvas.width  = W;
        canvas.height = H;
        cellW = W / GRID_COLS;
        cellH = H / GRID_ROWS;

        // Portrait cell → rotate 16:9 image 90° → fits as 9:16
        doRotate = (cellH > cellW);

        let maxW = cellW - IMG_PAD * 2;
        let maxH = cellH - IMG_PAD * 2;

        if (doRotate) {
            // After 90° rotation: image visual width = imgH, visual height = imgW
            // Fit into maxW x maxH: imgH <= maxW, imgW <= maxH, ratio imgW/imgH = 16/9
            if (maxW * 16 / 9 <= maxH) {
                imgH = Math.floor(maxW);
                imgW = Math.floor(maxW * 16 / 9);
            } else {
                imgW = Math.floor(maxH);
                imgH = Math.floor(maxH * 9 / 16);
            }
        } else {
            // Normal landscape fit
            if (maxW * 9 / 16 <= maxH) {
                imgW = Math.floor(maxW);
                imgH = Math.floor(maxW * 9 / 16);
            } else {
                imgH = Math.floor(maxH);
                imgW = Math.floor(maxH * 16 / 9);
            }
        }
    }

    function getCenter(idx) {
        let row = Math.floor((idx - 1) / GRID_COLS) + 1;
        let col = ((idx - 1) % GRID_COLS) + 1;
        return { x: (col - 0.5) * cellW, y: (row - 0.5) * cellH };
    }

    function getRegion(mx, my) {
        let col = Math.floor(mx / cellW) + 1;
        let row = Math.floor(my / cellH) + 1;
        if (col < 1 || col > GRID_COLS || row < 1 || row > GRID_ROWS) return 0;
        return (row - 1) * GRID_COLS + col;
    }

    let centerIdx = ((Math.ceil(GRID_ROWS / 2) - 1) * GRID_COLS) + Math.ceil(GRID_COLS / 2);
    let leftIdx   = centerIdx - 1;
    let rightIdx  = centerIdx + 1;

    // Compute pixel rect for a slot at grid cell idx
    function slotRect(idx) {
        let c = getCenter(idx);
        let visW = doRotate ? imgH : imgW;
        let visH = doRotate ? imgW : imgH;
        return {
            x: Math.floor(c.x - visW / 2),
            y: Math.floor(c.y - visH / 2),
            w: visW,
            h: visH
        };
    }

    // ---- Master render: redraws everything each frame ----
    function render() {
        ctx.clearRect(0, 0, W, H);

        // Background
        ctx.fillStyle = BG_COLOR;
        ctx.fillRect(0, 0, W, H);

        // Grid lines
        ctx.strokeStyle = "#000000";
        ctx.lineWidth   = 1;
        for (let i = 1; i <= GRID_LINES; i++) {
            let x = W * i / (GRID_LINES + 1);
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        }
        for (let i = 1; i <= GRID_LINES; i++) {
            let y = H * i / (GRID_LINES + 1);
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }

        // Images
        ["single", "left", "right"].forEach(key => {
            if (slotVis[key] && slotImg[key] && slots[key]) {
                drawImageInRect(slotImg[key], slots[key]);
            }
        });

        // Region label (phase 1)
        if (labelVisible && labelText) {
            drawLabel(labelText, labelX, labelY, "rgba(200,200,200,0.95)", "#000");
        }

        // Name below (correct answer)
        if (nameBelowVisible && nameBelowText) {
            drawLabel(nameBelowText, nameBelowX, nameBelowY, "rgba(80,190,80,0.97)", "#fff");
        }
    }

    // Draw image into a rect, rotating 90° if needed
    function drawImageInRect(img, rect) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(rect.x, rect.y, rect.w, rect.h);
        ctx.clip();

        if (doRotate) {
            // Translate to center of rect, rotate 90°, draw centered
            ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
            ctx.rotate(Math.PI / 2);
            ctx.drawImage(img, -imgW / 2, -imgH / 2, imgW, imgH);
        } else {
            ctx.drawImage(img, rect.x, rect.y, rect.w, rect.h);
        }

        // Border
        ctx.restore();
        ctx.strokeStyle = "#333";
        ctx.lineWidth   = 2;
        ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
    }

    // Draw a text label box
    function drawLabel(text, cx, cy, bgColor, textColor) {
        let fs   = Math.max(9, Math.floor(Math.min(cellW, cellH) / 7));
        ctx.font = "bold " + fs + "px Arial";
        let tw   = ctx.measureText(text).width;
        let pad  = 8;
        let bw   = tw + pad * 2;
        let bh   = fs + pad * 2;
        let bx   = Math.min(cx, W - bw - 4);
        let by   = Math.min(cy, H - bh - 4);
        bx = Math.max(4, bx);
        by = Math.max(4, by);

        ctx.fillStyle = bgColor;
        ctx.beginPath();
        ctx.roundRect(bx, by, bw, bh, 4);
        ctx.fill();

        ctx.fillStyle = textColor;
        ctx.fillText(text, bx + pad, by + pad + fs * 0.85);
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function rnd(n)    { return Math.floor(Math.random() * n); }

    function speak(text) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        let fixes = {
            "sea bass":  "see bhass", "bass": "bhass",
            "perch":     "purch",     "gar":  "garr",
            "soy":       "soe",       "phalarope": "FAL-a-rope"
        };
        Object.keys(fixes).sort((a,b) => b.length - a.length).forEach(w => {
            text = text.replace(new RegExp("\\b" + w + "\\b", "gi"), fixes[w]);
        });
        let u = new SpeechSynthesisUtterance(text);
        u.rate = 0.9; u.volume = 1;
        window.speechSynthesis.speak(u);
    }

    function showFeedback(msg) {
        let fb = document.getElementById("feedback");
        fb.style.fontSize = Math.max(22, Math.floor(Math.min(cellW,cellH)/3.5)) + "px";
        fb.textContent = msg;
        fb.style.display = "block";
    }
    function hideFeedback() {
        document.getElementById("feedback").style.display = "none";
    }

    // ============================================================
    // PHASE ONE
    // ============================================================
    async function phaseOne() {
        gameActive = false;
        clickPhase = 0;
        recalc();

        let i1 = rnd(IMAGE_URLS.length);
        let i2 = rnd(IMAGE_URLS.length);
        while (i2 === i1) i2 = rnd(IMAGE_URLS.length);
        shownIdx1 = i1; shownIdx2 = i2;

        correctImgName = IMAGE_NAMES[i1];
        correctRegion  = Math.floor(Math.random() * GRID_ROWS * GRID_COLS) + 1;
        let lc = getCenter(correctRegion);

        // Show single image + label
        slots.single  = slotRect(centerIdx);
        slotImg.single = loadedImages[i1];
        slotVis.single = true;
        slotVis.left   = false;
        slotVis.right  = false;

        labelText    = correctImgName;
        labelX       = lc.x - cellW * 0.3;
        labelY       = lc.y - cellH * 0.12;
        labelVisible = true;
        nameBelowVisible = false;

        render();
        await sleep(SHOW_SINGLE_MS);

        slotVis.single = false;
        labelVisible   = false;
        render();
        await sleep(GAP_BEFORE_PAIR);

        // Pair
        if (Math.random() < 0.5) {
            slotImg.left  = loadedImages[i2];
            slotImg.right = loadedImages[i1];
            correctSide   = "right";
        } else {
            slotImg.left  = loadedImages[i1];
            slotImg.right = loadedImages[i2];
            correctSide   = "left";
        }

        slots.left    = slotRect(leftIdx);
        slots.right   = slotRect(rightIdx);
        slotVis.left  = true;
        slotVis.right = true;

        render();
        clickPhase = 1;
        gameActive = true;
    }

    // ============================================================
    // CLICK / TAP
    // ============================================================
    function hitTest(px, py, rect) {
        return rect && px >= rect.x && px <= rect.x + rect.w &&
                       py >= rect.y && py <= rect.y + rect.h;
    }

    function handleTap(px, py) {
        if (!gameActive) return;

        if (clickPhase === 1) {
            let hitLeft  = hitTest(px, py, slots.left);
            let hitRight = hitTest(px, py, slots.right);
            if (!hitLeft && !hitRight) return;

            gameActive = false;
            let side = hitLeft ? "left" : "right";

            if (side !== correctSide) {
                slotVis.left = slotVis.right = false;
                render();
                showFeedback("WRONG\nIMAGE");
                sleep(WRONG_IMG_MS).then(() => {
                    hideFeedback(); render(); sleep(300).then(phaseOne);
                });
            } else {
                if (side === "left") {
                    slotVis.right = false;
                    nameLabelX = slots.left.x + 8;
                    nameLabelY = slots.left.y + slots.left.h + 8;
                } else {
                    slotVis.left = false;
                    nameLabelX = slots.right.x + 8;
                    nameLabelY = slots.right.y + slots.right.h + 8;
                }
                render();
                clickPhase = 2;
                gameActive = true;
            }
        }

        else if (clickPhase === 2) {
            gameActive = false;
            let region = getRegion(px, py);

            if (region === correctRegion) {
                nameBelowText    = correctImgName;
                nameBelowX       = nameLabelX;
                nameBelowY       = nameLabelY;
                nameBelowVisible = true;
                render();
                speak(correctImgName);
                sleep(CORRECT_FLASH_MS).then(() => {
                    nameBelowVisible = false;
                    slotVis.left = slotVis.right = false;
                    render();
                    sleep(300).then(phaseOne);
                });
            } else {
                slotVis.left = slotVis.right = false;
                render();
                showFeedback("WRONG");
                sleep(INCORRECT_MS).then(() => {
                    hideFeedback(); render(); sleep(300).then(phaseOne);
                });
            }
        }
    }

    document.addEventListener("click", e => handleTap(e.clientX, e.clientY));
    document.addEventListener("touchend", e => {
        e.preventDefault();
        let t = e.changedTouches[0];
        handleTap(t.clientX, t.clientY);
    }, { passive: false });

    window.addEventListener("resize", () => { recalc(); render(); });
    window.addEventListener("orientationchange", () => {
        setTimeout(() => { recalc(); render(); }, 350);
    });

    // Start by preloading all images, then begin
    preloadImages(() => {
        recalc();
        render();
        phaseOne();
    });
</script>
</body>
</html>
