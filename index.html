<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Brain Training</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow: hidden; touch-action: manipulation; background: #000; }
        #rotateWrap { position: fixed; top: 0; left: 0; }
        #gameCanvas { display: block; }
        
        /* Debug Timestamp */
        #debugTimestamp {
            position: absolute; top: 10px; left: 10px; z-index: 9999;
            color: #ff0; font: bold 16px monospace; background: rgba(0,0,0,0.8);
            padding: 6px 12px; border-radius: 6px; border: 2px solid #ff0;
            pointer-events: none;
        }

        /* Menu System */
        #menuWrap { position: fixed; z-index: 999; width: 48px; height: 48px; }
        #menuWrap.portrait-mode { transform: rotate(90deg); transform-origin: 24px 24px; }
        #menuBtn {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30,30,30,0.82); border: none; border-radius: 10px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 6px; padding: 10px; touch-action: manipulation;
        }
        #menuBtn.open { background: rgba(30,30,30,0.97); }
        #menuBtn span { display: block; width: 100%; height: 3px; background: #fff; border-radius: 2px; }

        #menuPanel {
            position: absolute; bottom: 54px; right: 0; z-index: 998;
            background: rgba(25,25,25,0.96); border-radius: 10px;
            overflow-y: auto; max-height: 80vh; 
            display: none; flex-direction: column; min-width: 200px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.3) transparent;
        }
        #menuPanel::-webkit-scrollbar { width: 6px; }
        #menuPanel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }
        #menuPanel.open { display: flex; }

        .menu-item {
            padding: 13px 18px; color: #fff; font: 15px Arial, sans-serif;
            cursor: pointer; white-space: nowrap; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover, .menu-item:active { background: rgba(255,255,255,0.12); }
        .menu-item.active-set { color: #6f6; }
        .menu-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 2px 0; flex-shrink: 0; }

        .video-sub, .ytimg-sub {
            padding: 10px 18px 10px 30px; font: 14px Arial, sans-serif; cursor: pointer; white-space: nowrap; 
            border-bottom: 1px solid rgba(255,255,255,0.05); display: none; flex-shrink: 0;
        }
        .video-sub { color: #8ef; } .ytimg-sub { color: #f88; }
        .video-sub.visible, .ytimg-sub.visible { display: block; }
        .video-sub:hover, .video-sub:active { background: rgba(100,200,255,0.1); }
        .ytimg-sub:hover, .ytimg-sub:active { background: rgba(255,100,100,0.1); }

        /* Video Play Wrapper */
        #videoWrap { display: none; position: absolute; z-index: 10; overflow: hidden; background: transparent; }
        #videoWrap.open { display: block; }
        #ytDiv { position: absolute; top: 0; left: 0; pointer-events: auto;}

        /* YTpix Game Wrappers */
        .yt-game-wrap { 
            display: none; position: absolute; z-index: 10; 
            overflow: hidden; background: #000;
            border: 2px solid #333; box-sizing: border-box;
        }
        .yt-hitbox { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 12; cursor: pointer; }

        #closeVideoBtn {
            position: absolute; top: 4px; right: 4px; z-index: 20;
            background: rgba(20,20,20,0.85); color: #fff; border: none; border-radius: 6px;
            font-size: 16px; width: 28px; height: 28px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; touch-action: manipulation;
        }
    </style>
</head>
<body>

<div id="debugTimestamp"></div>

<div id="rotateWrap">
    <canvas id="gameCanvas"></canvas>
    
    <div id="videoWrap">
        <div id="ytDiv"></div>
        <button id="closeVideoBtn" aria-label="Close">X</button>
    </div>

    <!-- YTpix game mode divs -->
    <div id="ytGameCenter" class="yt-game-wrap"></div>
    <div id="ytGameLeft" class="yt-game-wrap"></div>
    <div id="ytGameRight" class="yt-game-wrap"></div>
</div>

<div id="menuWrap">
    <div id="menuPanel">
        <div class="menu-item" id="miPlay">Play Video</div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="miYTasImage">YTpix</div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="miConfig">Config</div>
        <div class="menu-item" id="miHelp">Help</div>
        <div class="menu-divider"></div>
    </div>
    <button id="menuBtn" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    document.getElementById("debugTimestamp").innerText = new Date().toLocaleString();

    let IMAGE_URLS = [], IMAGE_NAMES = [], AUDIO_FILES = [], allSets = [], activeSetIndex = 0, allVideos = [];
    const GRID_LINES = 4, GRID_COLS = 5, GRID_ROWS = 5, SHOW_SINGLE_MS = 1000, GAP_BEFORE_PAIR = 500, CORRECT_FLASH_MS = 1500, INCORRECT_MS = 3000, WRONG_IMG_MS = 500, IMG_PAD = 6;
    let canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d"), wrap = document.getElementById("rotateWrap"), menuWrap = document.getElementById("menuWrap"), menuBtn = document.getElementById("menuBtn"), menuPanel = document.getElementById("menuPanel");
    let GW, GH, cellW, cellH, imgW, imgH, isPortrait, bgColor;
    let loadedImages = [], clickPhase = 0, correctRegion = 0, correctImgName = "", correctImgIndex = 0, correctSide = "", gameActive = false;
    let slots = { single:null, left:null, right:null }, slotImg = { single:null, left:null, right:null }, slotVis = { single:false, left:false, right:false };
    let bigSlot = null, bigImg = null, bigVis = false, hintVisible = false, hintImg = null, hintRegion = 0, nameBelowVisible = false, nameBelowText = "", feedbackVisible = false, feedbackText = "", currentAudio = null;

    // YTPIX MODE
    let isYTGameMode = false, ytGameVideo = null, ytGamePlayers = { center: null, left: null, right: null }, ytGameReadyCount = 0;
    let playExpanded = false, ytimgExpanded = false;

    function buildVideoMenus() {
        document.querySelectorAll(".video-sub, .ytimg-sub").forEach(el => el.remove());
        let anchorPlay = document.getElementById("miPlay"), anchorYT = document.getElementById("miYTasImage");
        allVideos.forEach((vid, i) => {
            let elP = document.createElement("div"); elP.className = "video-sub"; elP.textContent = "  > " + (vid.label || "Video " + (i+1));
            elP.addEventListener("pointerup", e => { e.stopPropagation(); collapseAllMenus(); closeMenu(); openVideo(vid); });
            anchorPlay.parentNode.insertBefore(elP, anchorPlay.nextSibling); anchorPlay = elP;

            let elY = document.createElement("div"); elY.className = "ytimg-sub"; elY.textContent = "  > " + (vid.label || "Video " + (i+1));
            elY.addEventListener("pointerup", e => { e.stopPropagation(); collapseAllMenus(); closeMenu(); startYTGame(vid); });
            anchorYT.parentNode.insertBefore(elY, anchorYT.nextSibling); anchorYT = elY;
        });
    }

    function collapseAllMenus() { playExpanded = ytimgExpanded = false; document.querySelectorAll(".video-sub, .ytimg-sub").forEach(el => el.classList.remove("visible")); }
    document.getElementById("miPlay").addEventListener("pointerup", e => { e.stopPropagation(); if (playExpanded) collapseAllMenus(); else { collapseAllMenus(); playExpanded = true; document.querySelectorAll(".video-sub").forEach(el => el.classList.add("visible")); menuPanel.scrollTop = 0; } });
    document.getElementById("miYTasImage").addEventListener("pointerup", e => { e.stopPropagation(); if (ytimgExpanded) collapseAllMenus(); else { collapseAllMenus(); ytimgExpanded = true; document.querySelectorAll(".ytimg-sub").forEach(el => el.classList.add("visible")); menuPanel.scrollTop = 0; } });

    let ytAPIReady = false; window.onYouTubeIframeAPIReady = function() { ytAPIReady = true; };

    function startYTGame(vid) {
        if (!ytAPIReady) { setTimeout(() => startYTGame(vid), 300); return; }
        if (videoOpen) closeVideo();
        isYTGameMode = true; ytGameVideo = vid; gameActive = false; clickPhase = 0;
        setupLayout(); renderGridOnly(); 
        
        slots.single = makeSlot(centerIdx); slots.left = makeSlot(leftIdx); slots.right = makeSlot(rightIdx);

        function positionYTGameWrap(id, rect) {
            let el = document.getElementById(id);
            el.style.left = rect.x + "px"; el.style.top = rect.y + "px";
            el.style.width = rect.w + "px"; el.style.height = rect.h + "px";
            // KEY SPEED FIX: Keep display block but drop opacity. Prevents browser from throttling load time!
            el.style.display = "block";
            el.style.opacity = "0.001"; 
        }
        
        positionYTGameWrap("ytGameCenter", slots.single);
        positionYTGameWrap("ytGameLeft", slots.left);
        positionYTGameWrap("ytGameRight", slots.right);

        ytGameReadyCount = 0;

        // Force crop on ID to guarantee it applies reliably to Left/Right
        function applyCrop(id, vidData) {
            let el = document.getElementById(id);
            if (!el) return;
            let crop = vidData.crop || [0, 0, 1, 1];
            let cL = crop[0], cT = crop[1], cR = crop[2], cB = crop[3];
            let cw = cR - cL; let ch = cB - cT;
            el.style.width = (100 / cw) + "%";
            el.style.height = (100 / ch) + "%";
            el.style.left = -(cL * 100 / cw) + "%";
            el.style.top = -(cT * 100 / ch) + "%";
            el.style.position = "absolute";
            el.style.pointerEvents = "none";
        }

        function createFreezePlayer(divId, key, targetTime) {
            if (ytGamePlayers[key]) ytGamePlayers[key].destroy();

            ytGamePlayers[key] = new YT.Player(divId, {
                videoId: vid.id,
                playerVars: { autoplay: 1, controls: 0, disablekb: 1, modestbranding: 1, rel: 0, showinfo: 0, mute: 1, start: targetTime, playsinline: 1 },
                events: {
                    onReady: (e) => { 
                        e.target.mute(); 
                        applyCrop(divId, vid); 
                    },
                    onStateChange: (e) => {
                        applyCrop(divId, vid); 
                        
                        if (e.data === YT.PlayerState.PLAYING) {
                            e.target.pauseVideo();
                        } 
                        else if (e.data === YT.PlayerState.PAUSED) {
                            // Only trigger once per video
                            if (!e.target.readyFlag) {
                                e.target.readyFlag = true;
                                ytGameReadyCount++;
                                if (ytGameReadyCount === 3) startYTGamePhase1(); 
                            }
                        }
                    }
                }
            });
        }

        let timeT = vid.start || 0, timeTdiff = vid.tdiff !== undefined ? vid.tdiff : 4;
        let timeT4 = timeT + timeTdiff;
        correctSide = Math.random() < 0.5 ? "right" : "left";
        
        // Reset HTML structures
        document.getElementById("ytGameCenter").innerHTML = '<div id="ytPlayerCenter"></div>';
        document.getElementById("ytGameLeft").innerHTML = '<div id="ytPlayerLeft"></div><div class="yt-hitbox" id="ytHitLeft"></div>';
        document.getElementById("ytGameRight").innerHTML = '<div id="ytPlayerRight"></div><div class="yt-hitbox" id="ytHitRight"></div>';

        createFreezePlayer("ytPlayerCenter", "center", timeT);
        if (correctSide === "right") { createFreezePlayer("ytPlayerRight", "right", timeT); createFreezePlayer("ytPlayerLeft", "left", timeT4); } 
        else { createFreezePlayer("ytPlayerLeft", "left", timeT); createFreezePlayer("ytPlayerRight", "right", timeT4); }
        
        document.getElementById("ytHitLeft").onpointerup = (e) => handleYTTap("left", e);
        document.getElementById("ytHitRight").onpointerup = (e) => handleYTTap("right", e);
    }

    async function startYTGamePhase1() {
        // Now that they are all fully painted and paused, restore opacity
        document.getElementById("ytGameCenter").style.opacity = "1";
        document.getElementById("ytGameLeft").style.opacity = "1";
        document.getElementById("ytGameRight").style.opacity = "1";

        // Logic sequence
        document.getElementById("ytGameLeft").style.display = "none";
        document.getElementById("ytGameRight").style.display = "none";
        document.getElementById("ytGameCenter").style.display = "block";
        
        await sleep(SHOW_SINGLE_MS);
        document.getElementById("ytGameCenter").style.display = "none";
        
        await sleep(GAP_BEFORE_PAIR);
        document.getElementById("ytGameLeft").style.display = "block";
        document.getElementById("ytGameRight").style.display = "block";
        
        clickPhase = 1; gameActive = true;
    }

    function handleYTTap(side, e) {
        if (!gameActive || clickPhase !== 1) return;
        e.stopPropagation(); gameActive = false;
        if (side !== correctSide) {
            document.getElementById("ytGameLeft").style.display = "none"; document.getElementById("ytGameRight").style.display = "none";
            feedbackText = "WRONG\\nFRAME"; feedbackVisible = true; renderGridOnly(); drawFeedback(feedbackText);
            sleep(WRONG_IMG_MS).then(() => { feedbackVisible = false; renderGridOnly(); sleep(300).then(() => startYTGame(ytGameVideo)); });
        } else {
            document.getElementById("ytGameLeft").style.display = "none"; document.getElementById("ytGameRight").style.display = "none";
            document.getElementById("ytGameCenter").style.display = "block";
            sleep(CORRECT_FLASH_MS).then(() => { document.getElementById("ytGameCenter").style.display = "none"; sleep(300).then(() => startYTGame(ytGameVideo)); });
        }
    }

    function stopYTGameMode() {
        isYTGameMode = false;
        ["ytGameCenter", "ytGameLeft", "ytGameRight"].forEach(id => document.getElementById(id).style.display = "none");
        if (ytGamePlayers.center) { ytGamePlayers.center.destroy(); ytGamePlayers.center = null; }
        if (ytGamePlayers.left) { ytGamePlayers.left.destroy(); ytGamePlayers.left = null; }
        if (ytGamePlayers.right) { ytGamePlayers.right.destroy(); ytGamePlayers.right = null; }
    }

    const videoWrap = document.getElementById("videoWrap"), closeVideoBtn = document.getElementById("closeVideoBtn");
    let ytPlayer = null, loopInterval = null, seekDebounce = false, currentVideo = null, videoOpen = false;

    function positionVideoWrap() {
        if (!currentVideo) return { ifW: 0, ifH: 0, ifX: 0, ifY: 0 };
        let isL = (currentVideo.isLandscape == 1 || currentVideo.isLandscape === true);
        let wrapX, wrapY, wrapW, wrapH, ifW, ifH, ifX, ifY;

        if (isL) {
            let boxX = cellW * 1, boxY = cellH * 1, boxW = cellW * 3, boxH = cellH * 3, scale = Math.min(boxW / 16, boxH / 9);
            wrapW = Math.floor(16 * scale); wrapH = Math.floor(9 * scale); wrapX = Math.floor(boxX + (boxW - wrapW) / 2); wrapY = Math.floor(boxY + (boxH - wrapH) / 2);
            ifW = wrapW; ifH = wrapH; ifX = 0; ifY = 0;
        } else {
            wrapX = Math.floor(cellW * 2); wrapY = Math.floor(cellH * 1); wrapW = Math.floor(cellW * 1); wrapH = Math.floor(cellH * 3);
            ifH = wrapH; ifW = Math.round(ifH * 16 / 9); ifX = Math.round((wrapW - ifW) / 2); ifY = 0;
        }
        videoWrap.style.left = wrapX + "px"; videoWrap.style.top = wrapY + "px"; videoWrap.style.width = wrapW + "px"; videoWrap.style.height = wrapH + "px";
        if (ytPlayer && ytPlayer.getIframe) { try { let iframe = ytPlayer.getIframe(); if (iframe) { iframe.style.position = "absolute"; iframe.style.width = ifW + "px"; iframe.style.height = ifH + "px"; iframe.style.left = ifX + "px"; iframe.style.top = ifY + "px"; iframe.style.opacity = 1; } } catch(e) {} }
        return { ifW, ifH, ifX, ifY };
    }

    function openVideo(vid) {
        if (isYTGameMode) stopYTGameMode();
        currentVideo = vid; videoOpen = true; gameActive = false; setupLayout(); let dims = positionVideoWrap(); videoWrap.classList.add("open"); renderGridOnly(); 
        if (ytPlayer) { positionVideoWrap(); ytPlayer.loadVideoById({ videoId: vid.id, startSeconds: vid.start || 0 }); if (vid.mute == 1 || vid.mute === true) ytPlayer.mute(); else ytPlayer.unMute(); startLoopWatcher(); return; }
        if (!ytAPIReady) { setTimeout(() => openVideo(vid), 300); return; }
        let ytDiv = document.getElementById("ytDiv"); if (!ytDiv) { ytDiv = document.createElement("div"); ytDiv.id = "ytDiv"; videoWrap.insertBefore(ytDiv, closeVideoBtn); }
        ytPlayer = new YT.Player("ytDiv", { width: dims.ifW, height: dims.ifH, videoId: vid.id, playerVars: { autoplay: 1, start: vid.start || 0, controls: 0, rel: 0, modestbranding: 1, playsinline: 1, enablejsapi: 1, mute: (vid.mute == 1 || vid.mute === true) ? 1 : 0 }, events: { onReady: function(e) { positionVideoWrap(); if (vid.mute == 1 || vid.mute === true) e.target.mute(); e.target.playVideo(); startLoopWatcher(); }, onStateChange: function(e) { if (e.data === YT.PlayerState.ENDED) doSeekLoop(); } } });
    }

    function doSeekLoop() { if (!currentVideo || seekDebounce) return; seekDebounce = true; ytPlayer.seekTo(currentVideo.start || 0, true); ytPlayer.playVideo(); setTimeout(() => { seekDebounce = false; }, 800); }
    function startLoopWatcher() { if (loopInterval) clearInterval(loopInterval); loopInterval = setInterval(() => { if (!videoOpen || !ytPlayer || typeof ytPlayer.getCurrentTime !== "function") return; try { if (!currentVideo || !currentVideo.end) return; let t = ytPlayer.getCurrentTime(); if (!seekDebounce && t >= currentVideo.end) doSeekLoop(); } catch(e) {} }, 250); }
    function closeVideo() { videoOpen = false; videoWrap.classList.remove("open"); if (loopInterval) { clearInterval(loopInterval); loopInterval = null; } if (ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo(); currentVideo = null; render(); if (clickPhase > 0 && !isYTGameMode) gameActive = true; }
    closeVideoBtn.addEventListener("pointerup", e => { e.stopPropagation(); closeVideo(); });

    function renderGridOnly() {
        ctx.fillStyle = bgColor; ctx.fillRect(0, 0, GW, GH); ctx.strokeStyle = "#000"; ctx.lineWidth = 1;
        for (let i = 1; i <= GRID_LINES; i++) { let x = GW * i / (GRID_LINES + 1); ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GH); ctx.stroke(); }
        for (let i = 1; i <= GRID_LINES; i++) { let y = GH * i / (GRID_LINES + 1); ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GW, y); ctx.stroke(); }
    }

    function buildMenuItems() {
        document.querySelectorAll(".menu-set-item").forEach(el => el.remove());
        allSets.forEach((set, i) => {
            let el = document.createElement("div"); el.className = "menu-item menu-set-item" + (i === activeSetIndex ? " active-set" : ""); el.textContent = (i === activeSetIndex ? "+ " : "  ") + set.name;
            el.addEventListener("pointerup", e => { e.stopPropagation(); switchSet(i); }); menuPanel.appendChild(el);
        });
    }

    function updateMenuPosition() {
        let PAD = 14;
        if (isPortrait) { menuWrap.classList.add("portrait-mode"); menuWrap.style.bottom = PAD + "px"; menuWrap.style.left = PAD + "px"; menuWrap.style.right = "auto"; }
        else { menuWrap.classList.remove("portrait-mode"); menuWrap.style.bottom = PAD + "px"; menuWrap.style.right = PAD + "px"; menuWrap.style.left = "auto"; }
    }

    function closeMenu() { collapseAllMenus(); menuPanel.classList.remove("open"); menuBtn.classList.remove("open"); }
    menuBtn.addEventListener("pointerup", e => { e.stopPropagation(); let isOpen = menuPanel.classList.toggle("open"); menuBtn.classList.toggle("open", isOpen); if (!isOpen) collapseAllMenus(); });
    menuPanel.addEventListener("pointerup", e => e.stopPropagation());
    document.getElementById("miConfig").addEventListener("pointerup", e => { e.stopPropagation(); closeMenu(); alert("Config - coming soon"); });
    document.getElementById("miHelp").addEventListener("pointerup", e => { e.stopPropagation(); closeMenu(); alert("Help - coming soon"); });
    document.addEventListener("pointerup", e => { if (menuPanel.classList.contains("open")) { closeMenu(); return; } if (isYTGameMode) return; handleTap(e.clientX, e.clientY); });

    function setupLayout() {
        let pw = window.innerWidth, ph = window.innerHeight; isPortrait = pw < ph; bgColor = Math.min(pw, ph) < 600 ? "#7ab8e8" : "#ffffff";
        if (isPortrait) { GW = ph; GH = pw; canvas.width = GW; canvas.height = GH; wrap.style.width = GW + "px"; wrap.style.height = GH + "px"; wrap.style.transformOrigin = "0 0"; wrap.style.transform = "rotate(90deg) translateY(-" + pw + "px)"; }
        else { GW = pw; GH = ph; canvas.width = GW; canvas.height = GH; wrap.style.width = GW + "px"; wrap.style.height = GH + "px"; wrap.style.transformOrigin = "0 0"; wrap.style.transform = "none"; }
        cellW = GW / GRID_COLS; cellH = GH / GRID_ROWS; let maxW = cellW - IMG_PAD * 2, maxH = cellH - IMG_PAD * 2;
        if (maxW * 9 / 16 <= maxH) { imgW = Math.floor(maxW); imgH = Math.floor(maxW * 9 / 16); } else { imgH = Math.floor(maxH); imgW = Math.floor(maxH * 16 / 9); }
        updateMenuPosition(); if (videoOpen) positionVideoWrap();
        if (isYTGameMode) {
            slots.single = makeSlot(centerIdx); slots.left = makeSlot(leftIdx); slots.right = makeSlot(rightIdx);
            ["ytGameCenter", "ytGameLeft", "ytGameRight"].forEach((id, i) => { let r = i===0 ? slots.single : i===1 ? slots.left : slots.right; let el = document.getElementById(id); el.style.left = r.x + "px"; el.style.top = r.y + "px"; el.style.width = r.w + "px"; el.style.height = r.h + "px"; });
        }
    }

    function toGame(px, py) { if (isPortrait) return { x: py, y: window.innerWidth - px }; return { x: px, y: py }; }
    function getCenter(idx) { let row = Math.floor((idx - 1) / GRID_COLS) + 1; let col = ((idx - 1) % GRID_COLS) + 1; return { x: (col - 0.5) * cellW, y: (row - 0.5) * cellH }; }
    function getRegion(gx, gy) { let col = Math.floor(gx / cellW) + 1; let row = Math.floor(gy / cellH) + 1; if (col < 1 || col > GRID_COLS || row < 1 || row > GRID_ROWS) return 0; return (row - 1) * GRID_COLS + col; }

    let centerIdx = ((Math.ceil(GRID_ROWS / 2) - 1) * GRID_COLS) + Math.ceil(GRID_COLS / 2);
    let leftIdx   = centerIdx - 1, rightIdx  = centerIdx + 1;

    function makeSlot(idx) { let c = getCenter(idx); return { x: Math.floor(c.x - imgW / 2), y: Math.floor(c.y - imgH / 2), w: imgW, h: imgH }; }
    function makeBigSlot(img) { let boxX = cellW, boxY = cellH, boxW = cellW * 3, boxH = cellH * 3; let iw = img.naturalWidth || img.width || boxW; let ih = img.naturalHeight || img.height || boxH; let scale = Math.min(boxW / iw, boxH / ih); let dw = Math.floor(iw * scale), dh = Math.floor(ih * scale); return { x: Math.floor(boxX + (boxW - dw) / 2), y: Math.floor(boxY + (boxH - dh) / 2), w: dw, h: dh }; }
    function getLabelZone() { return { cx: cellW * 2.5, cy: cellH * 4.5, zoneW: cellW * 3, zoneH: cellH }; }

    function drawImg(img, r) { ctx.save(); ctx.beginPath(); ctx.rect(r.x, r.y, r.w, r.h); ctx.clip(); ctx.drawImage(img, r.x, r.y, r.w, r.h); ctx.restore(); ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.strokeRect(r.x, r.y, r.w, r.h); }
    function drawBigImg(img, r) { ctx.drawImage(img, r.x, r.y, r.w, r.h); ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.strokeRect(r.x, r.y, r.w, r.h); }
    function drawHint(img, regionIdx) { let c = getCenter(regionIdx); let tw = Math.floor(imgW * 0.20), th = Math.floor(imgH * 0.20); let tx = Math.floor(c.x - tw / 2), ty = Math.floor(c.y - th / 2); ctx.drawImage(img, tx, ty, tw, th); ctx.strokeStyle = "rgba(0,0,0,0.6)"; ctx.lineWidth = 1; ctx.strokeRect(tx, ty, tw, th); }
    function drawFittedLabel(text, cx, cy, maxW, maxH, bg, fg) { let pad = 10, fs = Math.floor(maxH * 0.275); ctx.font = "bold " + fs + "px Arial"; while (fs > 4 && ctx.measureText(text).width > maxW - pad * 2) { fs--; ctx.font = "bold " + fs + "px Arial"; } let tw = ctx.measureText(text).width, bw = tw + pad * 2, bh = fs + pad * 2; let bx = Math.max(2, Math.min(cx - bw / 2, GW - bw - 2)); let by = Math.max(2, Math.min(cy - bh / 2, GH - bh - 2)); ctx.fillStyle = bg; ctx.beginPath(); if (ctx.roundRect) ctx.roundRect(bx, by, bw, bh, 6); else ctx.rect(bx, by, bw, bh); ctx.fill(); ctx.fillStyle = fg; ctx.fillText(text, bx + pad, by + pad + fs * 0.85); }
    function drawFeedback(text) { let fs = Math.max(12, Math.floor(GH / 10)); ctx.font = "bold " + fs + "px Arial"; let lines = text.split("\\n"), maxW = 0; lines.forEach(l => { let m = ctx.measureText(l).width; if (m > maxW) maxW = m; }); let pad = 24, bw = maxW + pad * 2, bh = (fs + 10) * lines.length + pad * 2; let bx = GW / 2 - bw / 2, by = GH / 2 - bh / 2; ctx.fillStyle = "rgba(255,60,60,0.97)"; ctx.beginPath(); if (ctx.roundRect) ctx.roundRect(bx, by, bw, bh, 10); else ctx.rect(bx, by, bw, bh); ctx.fill(); ctx.fillStyle = "#fff"; lines.forEach((l, i) => ctx.fillText(l, GW / 2 - ctx.measureText(l).width / 2, by + pad + fs * 0.85 + i * (fs + 10))); }

    function render() {
        if (videoOpen || isYTGameMode) { renderGridOnly(); return; }
        renderGridOnly(); ["single", "left", "right"].forEach(k => { if (slotVis[k] && slotImg[k] && slots[k]) drawImg(slotImg[k], slots[k]); });
        if (bigVis && bigImg && bigSlot) drawBigImg(bigImg, bigSlot); if (hintVisible && hintImg) drawHint(hintImg, hintRegion);
        if (nameBelowVisible) { let z = getLabelZone(); drawFittedLabel(nameBelowText, z.cx, z.cy, z.zoneW, z.zoneH, "rgba(60,180,60,0.97)", "#fff"); }
        if (feedbackVisible) drawFeedback(feedbackText);
    }

    function playAudio(idx) { return new Promise(resolve => { if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; } let src = AUDIO_FILES[idx]; if (!src) { resolve(); return; } currentAudio = new Audio(src); currentAudio.onended = resolve; currentAudio.onerror = resolve; currentAudio.play().catch(resolve); }); }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function rnd(n) { return Math.floor(Math.random() * n); }

    function preloadImages(cb) { if (!IMAGE_URLS.length) { cb(); return; } loadedImages = new Array(IMAGE_URLS.length); let n = 0; IMAGE_URLS.forEach((url, i) => { let img = new Image(); img.onload = img.onerror = () => { if (++n === IMAGE_URLS.length) cb(); }; img.src = url; loadedImages[i] = img; }); }
    function loadSet(set, cb) { IMAGE_URLS = set.items.map(it => `${set.folder}/${it.base}.jpg`); IMAGE_NAMES = set.items.map(it => it.label); AUDIO_FILES = set.items.map(it => `${set.folder}/${it.base}.mp3`); loadedImages = []; preloadImages(cb); }
    
    function switchSet(i) { closeMenu(); if (i === activeSetIndex && !isYTGameMode) return; if (isYTGameMode) stopYTGameMode(); activeSetIndex = i; gameActive = false; if (videoOpen) closeVideo(); buildMenuItems(); loadSet(allSets[i], () => { setupLayout(); render(); phaseOne(); }); }

    async function phaseOne() {
        gameActive = false; clickPhase = 0; setupLayout(); bigVis = false; bigImg = null; bigSlot = null; nameBelowVisible = false; hintVisible = false; feedbackVisible = false;
        let i1 = rnd(IMAGE_URLS.length), i2 = rnd(IMAGE_URLS.length); while (i2 === i1) i2 = rnd(IMAGE_URLS.length);
        correctImgIndex = i1; correctImgName = IMAGE_NAMES[i1]; correctRegion = Math.floor(Math.random() * GRID_ROWS * GRID_COLS) + 1;
        slots.single = makeSlot(centerIdx); slotImg.single = loadedImages[i1]; slotVis.single = true; slotVis.left = false; slotVis.right = false; hintImg = loadedImages[i1]; hintRegion = correctRegion; hintVisible = true;
        render(); await sleep(SHOW_SINGLE_MS); slotVis.single = false; hintVisible = false; render(); await sleep(GAP_BEFORE_PAIR);
        if (Math.random() < 0.5) { slotImg.left = loadedImages[i2]; slotImg.right = loadedImages[i1]; correctSide = "right"; } else { slotImg.left = loadedImages[i1]; slotImg.right = loadedImages[i2]; correctSide = "left"; }
        slots.left = makeSlot(leftIdx); slots.right = makeSlot(rightIdx); slotVis.left = slotVis.right = true; render(); clickPhase = 1; gameActive = true;
    }

    async function handleCorrectLocation() {
        slotVis.left = false; slotVis.right = false; let img = loadedImages[correctImgIndex]; bigSlot = makeBigSlot(img); bigImg = img; bigVis = true; nameBelowText = correctImgName; nameBelowVisible = true; render();
        await playAudio(correctImgIndex); await sleep(CORRECT_FLASH_MS); bigVis = false; nameBelowVisible = false; render(); await sleep(300); phaseOne();
    }

    function hitTest(gx, gy, r) { return r && gx >= r.x && gx <= r.x + r.w && gy >= r.y && gy <= r.y + r.h; }
    function handleTap(px, py) {
        if (!gameActive || videoOpen || isYTGameMode) return;
        let g = toGame(px, py), gx = g.x, gy = g.y;
        if (clickPhase === 1) {
            let hl = hitTest(gx, gy, slots.left), hr = hitTest(gx, gy, slots.right); if (!hl && !hr) return;
            gameActive = false; let side = hl ? "left" : "right";
            if (side !== correctSide) { slotVis.left = slotVis.right = false; feedbackText = "WRONG\\nIMAGE"; feedbackVisible = true; render(); sleep(WRONG_IMG_MS).then(() => { feedbackVisible = false; render(); sleep(300).then(phaseOne); }); } 
            else { if (side === "left") slotVis.right = false; else slotVis.left = false; render(); clickPhase = 2; gameActive = true; }
        } else if (clickPhase === 2) {
            gameActive = false; let region = getRegion(gx, gy);
            if (region === correctRegion) { handleCorrectLocation(); } 
            else { slotVis.left = slotVis.right = false; feedbackText = "WRONG"; feedbackVisible = true; render(); sleep(INCORRECT_MS).then(() => { feedbackVisible = false; render(); sleep(300).then(phaseOne); }); }
        }
    }

    window.addEventListener("resize", () => { setupLayout(); render(); });
    window.addEventListener("orientationchange", () => { setTimeout(() => { setupLayout(); render(); }, 350); });

    Promise.all([
        fetch("assets.json?v="  + Date.now()).then(r => r.json()), 
        fetch("yt.json?v=" + Date.now()).then(r => r.json()).catch(() => ({ videos: [] }))
    ]).then(([assetData, ytData]) => {
        allSets = assetData.sets || []; allVideos = ytData.videos || [];
        if (!allSets.length) throw new Error("No sets in assets.json");
        activeSetIndex = 0; buildMenuItems(); buildVideoMenus();
        loadSet(allSets[0], () => { setupLayout(); render(); phaseOne(); });
    }).catch(err => {
        console.error("Startup error:", err); setupLayout(); ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, GW || 400, GH || 300); ctx.fillStyle = "#c00"; ctx.font = "bold 18px Arial"; ctx.fillText("Error: " + err.message, 20, (GH || 300) / 2);
    });
</script>
</body>
</html>
