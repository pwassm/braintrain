<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Brain Training</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; touch-action: manipulation; background: #000; }
#rotateWrap { position: fixed; top: 0; left: 0; }
#gameCanvas { display: block; }

#menuWrap { position: fixed; z-index: 999; width: 48px; height: 48px; }
#menuWrap.portrait-mode { transform: rotate(90deg); transform-origin: 24px 24px; }
#menuBtn {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(30,30,30,0.82); border: none; border-radius: 10px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 10px; touch-action: manipulation;
}
#menuBtn.open { background: rgba(30,30,30,0.97); }
#menuBtn span { display: block; width: 100%; height: 3px; background: #fff; border-radius: 2px; }

#menuPanel {
    position: absolute; bottom: 54px; right: 0; z-index: 998;
    background: rgba(25,25,25,0.96); border-radius: 10px;
    overflow-y: auto; max-height: 80vh;
    display: none; flex-direction: column; min-width: 200px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.3) transparent;
}
#menuPanel::-webkit-scrollbar { width: 6px; }
#menuPanel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }
#menuPanel.open { display: flex; }

#menuDateStamp {
    padding: 6px 12px 2px 12px; font: 10px Arial, sans-serif;
    color: rgba(255,255,255,0.35); text-align: right;
    flex-shrink: 0; user-select: none; letter-spacing: 0.3px;
}

.menu-item {
    padding: 13px 18px; color: #fff; font: 15px Arial, sans-serif;
    cursor: pointer; white-space: nowrap; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:hover, .menu-item:active { background: rgba(255,255,255,0.12); }
.menu-item.active-set { color: #6f6; }
.menu-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 2px 0; flex-shrink: 0; }

#versionBtn {
    position: fixed; z-index: 999;
    background: rgba(30,30,30,0.82); border: none; border-radius: 10px;
    color: rgba(255,255,255,0.75); font: bold 12px Arial, sans-serif;
    padding: 0 10px; height: 48px; cursor: default;
    display: flex; align-items: center; justify-content: center;
    white-space: nowrap; pointer-events: none;
}
#versionBtn.portrait-mode { transform: rotate(90deg); transform-origin: 24px 24px; }
</style>
</head>
<body>

<div id="rotateWrap">
    <canvas id="gameCanvas"></canvas>
</div>

<div id="versionBtn">v1.1</div>

<div id="menuWrap">
    <div id="menuPanel">
        <div id="menuDateStamp"></div>
        <div class="menu-item" id="miHelp">Help</div>
        <div class="menu-divider"></div>
    </div>
    <button id="menuBtn"><span></span><span></span><span></span></button>
</div>

<script>
// -- date stamp in menu ----------------------------------------------------
(function(){
    const d = new Date();
    document.getElementById("menuDateStamp").textContent =
        d.toLocaleDateString(undefined, {weekday:"short", month:"short", day:"numeric", year:"numeric"})
        + " " + d.toLocaleTimeString(undefined, {hour:"2-digit", minute:"2-digit"});
})();

// -- constants -------------------------------------------------------------
const GRID_COLS = 5, GRID_ROWS = 5;
const IMG_PAD = 6;
const SHOW_SINGLE_MS = 1000, GAP_BEFORE_PAIR = 500, CORRECT_FLASH_MS = 1500;
const INCORRECT_MS = 3000, WRONG_IMG_MS = 500;

// -- layout globals --------------------------------------------------------
let GW, GH, cellW, cellH, imgW, imgH, isPortrait;
const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
const wrap = document.getElementById("rotateWrap");
const menuWrap = document.getElementById("menuWrap");
const menuBtn = document.getElementById("menuBtn");
const menuPanel = document.getElementById("menuPanel");

// -- game state ------------------------------------------------------------
let IMAGE_URLS = [], IMAGE_NAMES = [], AUDIO_FILES = [], allSets = [], activeSetIndex = 0;
let loadedImages = [], clickPhase = 0, correctRegion = 0;
let correctImgName = "", correctImgIndex = 0, correctSide = "", gameActive = false;
let slots = {single:null, left:null, right:null};
let slotImg = {single:null, left:null, right:null};
let slotVis = {single:false, left:false, right:false};
let bigSlot = null, bigImg = null, bigVis = false;
let hintVisible = false, hintImg = null, hintRegion = 0;
let nameBelowVisible = false, nameBelowText = "";
let feedbackVisible = false, feedbackText = "";
let currentAudio = null;

const centerIdx = ((Math.ceil(GRID_ROWS/2)-1) * GRID_COLS) + Math.ceil(GRID_COLS/2);
const leftIdx = centerIdx - 1, rightIdx = centerIdx + 1;

const sleep = ms => new Promise(r => setTimeout(r, ms));
const rnd = n => Math.floor(Math.random() * n);

// -- canvas rendering ------------------------------------------------------
function drawImg(img, r) {
    ctx.save(); ctx.beginPath(); ctx.rect(r.x, r.y, r.w, r.h); ctx.clip();
    ctx.drawImage(img, r.x, r.y, r.w, r.h); ctx.restore();
    ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.strokeRect(r.x, r.y, r.w, r.h);
}
function drawBigImg(img, r) {
    ctx.drawImage(img, r.x, r.y, r.w, r.h);
    ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.strokeRect(r.x, r.y, r.w, r.h);
}
function drawHint(img, regionIdx) {
    const c = getCenter(regionIdx);
    const tw = Math.floor(imgW * 0.20), th = Math.floor(imgH * 0.20);
    const tx = Math.floor(c.x - tw/2), ty = Math.floor(c.y - th/2);
    ctx.drawImage(img, tx, ty, tw, th);
    ctx.strokeStyle = "rgba(0,0,0,0.6)"; ctx.lineWidth = 1; ctx.strokeRect(tx, ty, tw, th);
}
function drawFittedLabel(text, cx, cy, maxW, maxH, bg, fg) {
    let pad = 10, fs = Math.floor(maxH * 0.275);
    ctx.font = "bold " + fs + "px Arial";
    while (fs > 4 && ctx.measureText(text).width > maxW - pad*2) { fs--; ctx.font = "bold " + fs + "px Arial"; }
    const tw = ctx.measureText(text).width, bw = tw + pad*2, bh = fs + pad*2;
    const bx = Math.max(2, Math.min(cx - bw/2, GW - bw - 2)), by = Math.max(2, Math.min(cy - bh/2, GH - bh - 2));
    ctx.fillStyle = bg; ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(bx, by, bw, bh, 6); else ctx.rect(bx, by, bw, bh);
    ctx.fill(); ctx.fillStyle = fg; ctx.fillText(text, bx + pad, by + pad + fs * 0.85);
}
function drawFeedback(text) {
    const fs = Math.max(12, Math.floor(GH/10));
    ctx.font = "bold " + fs + "px Arial";
    const lines = text.split("\n"); let maxW = 0;
    lines.forEach(l => { const m = ctx.measureText(l).width; if (m > maxW) maxW = m; });
    const pad = 24, bw = maxW + pad*2, bh = (fs + 10) * lines.length + pad*2;
    const bx = GW/2 - bw/2, by = GH/2 - bh/2;
    ctx.fillStyle = "rgba(255,60,60,0.97)"; ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(bx, by, bw, bh, 10); else ctx.rect(bx, by, bw, bh);
    ctx.fill(); ctx.fillStyle = "#fff";
    lines.forEach((l, i) => ctx.fillText(l, GW/2 - ctx.measureText(l).width/2, by + pad + fs*0.85 + i*(fs+10)));
}
function render() {
    ctx.fillStyle = "#111"; ctx.fillRect(0, 0, GW, GH);
    // grid lines
    ctx.strokeStyle = "#555"; ctx.lineWidth = 1.5;
    for (let c = 1; c < GRID_COLS; c++) { ctx.beginPath(); ctx.moveTo(c*cellW, 0); ctx.lineTo(c*cellW, GH); ctx.stroke(); }
    for (let r = 1; r < GRID_ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r*cellH); ctx.lineTo(GW, r*cellH); ctx.stroke(); }
    if (slotVis.single && slotImg.single) drawImg(slotImg.single, slots.single);
    if (slotVis.left  && slotImg.left)   drawImg(slotImg.left,   slots.left);
    if (slotVis.right && slotImg.right)  drawImg(slotImg.right,  slots.right);
    if (bigVis && bigImg && bigSlot)     drawBigImg(bigImg, bigSlot);
    if (hintVisible && hintImg)          drawHint(hintImg, hintRegion);
    if (nameBelowVisible) {
        const lz = getLabelZone();
        drawFittedLabel(nameBelowText, lz.cx, lz.cy, lz.zoneW, lz.zoneH, "rgba(0,0,0,0.82)", "#fff");
    }
    if (feedbackVisible) drawFeedback(feedbackText);
}

// -- layout ----------------------------------------------------------------
function setupLayout() {
    const pw = window.innerWidth, ph = window.innerHeight;
    isPortrait = ph > pw;
    if (isPortrait) {
        GW = ph; GH = pw; canvas.width = GW; canvas.height = GH;
        wrap.style.width = GW + "px"; wrap.style.height = GH + "px";
        wrap.style.transformOrigin = "0 0";
        wrap.style.transform = "rotate(90deg) translateY(-" + pw + "px)";
    } else {
        GW = pw; GH = ph; canvas.width = GW; canvas.height = GH;
        wrap.style.width = GW + "px"; wrap.style.height = GH + "px";
        wrap.style.transformOrigin = "0 0"; wrap.style.transform = "none";
    }
    cellW = GW / GRID_COLS; cellH = GH / GRID_ROWS;
    const maxW = cellW - IMG_PAD*2, maxH = cellH - IMG_PAD*2;
    if (maxW * 9/16 <= maxH) { imgW = Math.floor(maxW); imgH = Math.floor(maxW * 9/16); }
    else { imgH = Math.floor(maxH); imgW = Math.floor(maxH * 16/9); }
    updateMenuPosition();
}
function getCenter(idx) {
    const row = Math.floor((idx-1)/GRID_COLS)+1, col = ((idx-1)%GRID_COLS)+1;
    return {x: (col-0.5)*cellW, y: (row-0.5)*cellH};
}
function getRegion(gx, gy) {
    const col = Math.floor(gx/cellW)+1, row = Math.floor(gy/cellH)+1;
    if (col<1||col>GRID_COLS||row<1||row>GRID_ROWS) return 0;
    return (row-1)*GRID_COLS + col;
}
function makeSlot(idx) {
    const c = getCenter(idx);
    return {x: Math.floor(c.x - imgW/2), y: Math.floor(c.y - imgH/2), w: imgW, h: imgH};
}
function makeBigSlot(img) {
    const boxX=cellW, boxY=cellH, boxW=cellW*3, boxH=cellH*3;
    const iw=img.naturalWidth||boxW, ih=img.naturalHeight||boxH;
    const scale = Math.min(boxW/iw, boxH/ih);
    const dw = Math.floor(iw*scale), dh = Math.floor(ih*scale);
    return {x: Math.floor(boxX+(boxW-dw)/2), y: Math.floor(boxY+(boxH-dh)/2), w:dw, h:dh};
}
function getLabelZone() { return {cx:cellW*2.5, cy:cellH*4.5, zoneW:cellW*3, zoneH:cellH}; }
function toGame(px, py) { if (isPortrait) return {x:py, y:window.innerWidth-px}; return {x:px, y:py}; }

// -- hamburger menu --------------------------------------------------------
function closeMenu() { menuPanel.classList.remove("open"); menuBtn.classList.remove("open"); }
function updateMenuPosition() {
    const PAD = 14, BTN = 48, GAP = 8;
    const vBtn = document.getElementById("versionBtn");
    if (isPortrait) {
        menuWrap.classList.add("portrait-mode");
        menuWrap.style.bottom = PAD + "px"; menuWrap.style.left = PAD + "px"; menuWrap.style.right = "auto";
        vBtn.classList.add("portrait-mode");
        vBtn.style.bottom = (PAD + BTN + GAP) + "px"; vBtn.style.left = PAD + "px"; vBtn.style.right = "auto";
    } else {
        menuWrap.classList.remove("portrait-mode");
        menuWrap.style.bottom = PAD + "px"; menuWrap.style.right = PAD + "px"; menuWrap.style.left = "auto";
        vBtn.classList.remove("portrait-mode");
        vBtn.style.bottom = PAD + "px"; vBtn.style.right = (PAD + BTN + GAP) + "px"; vBtn.style.left = "auto";
    }
}
function buildMenuItems() {
    document.querySelectorAll(".menu-set-item").forEach(el => el.remove());
    allSets.forEach((set, i) => {
        const el = document.createElement("div");
        el.className = "menu-item menu-set-item" + (i === activeSetIndex ? " active-set" : "");
        el.textContent = (i === activeSetIndex ? "+ " : "  ") + set.name;
        el.addEventListener("pointerup", e => { e.stopPropagation(); switchSet(i); });
        menuPanel.appendChild(el);
    });
}

document.getElementById("miHelp").addEventListener("pointerup", e => {
    e.stopPropagation(); closeMenu();
    alert("Brain Training\n\n1. A single image appears in Location 1 (the center).\n2. Simultaneously, another image or text appears at Location 2.\n3. When two images appear side by side, click the image that appeared in the center, then click Location 2.\n4. After your feedback, the game repeats.");
});
menuBtn.addEventListener("pointerup", e => {
    e.stopPropagation();
    const isOpen = menuPanel.classList.toggle("open");
    menuBtn.classList.toggle("open", isOpen);
});
menuPanel.addEventListener("pointerup", e => e.stopPropagation());
document.addEventListener("pointerup", e => {
    if (menuPanel.classList.contains("open")) { closeMenu(); return; }
    handleTap(e.clientX, e.clientY);
});

// -- audio / image loading -------------------------------------------------
function playAudio(idx) {
    return new Promise(resolve => {
        if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
        const src = AUDIO_FILES[idx];
        if (!src) { resolve(); return; }
        currentAudio = new Audio(src);
        currentAudio.onended = resolve; currentAudio.onerror = resolve;
        currentAudio.play().catch(resolve);
    });
}
function preloadImages(cb) {
    if (!IMAGE_URLS.length) { cb(); return; }
    loadedImages = new Array(IMAGE_URLS.length);
    let n = 0;
    IMAGE_URLS.forEach((url, i) => {
        const img = new Image();
        img.onload = img.onerror = () => { if (++n === IMAGE_URLS.length) cb(); };
        img.src = url; loadedImages[i] = img;
    });
}
function loadSet(set, cb) {
    IMAGE_URLS  = set.items.map(it => `${set.folder}/${it.base}.jpg`);
    IMAGE_NAMES = set.items.map(it => it.label);
    AUDIO_FILES = set.items.map(it => `${set.folder}/${it.base}.mp3`);
    loadedImages = []; preloadImages(cb);
}
function switchSet(i) {
    closeMenu();
    if (i === activeSetIndex) return;
    activeSetIndex = i; gameActive = false;
    buildMenuItems();
    loadSet(allSets[i], () => { setupLayout(); render(); phaseOne(); });
}

// -- game phases -----------------------------------------------------------
async function phaseOne() {
    gameActive = false; clickPhase = 0; setupLayout();
    bigVis = false; bigImg = null; bigSlot = null;
    nameBelowVisible = false; hintVisible = false; feedbackVisible = false;
    let i1 = rnd(IMAGE_URLS.length), i2 = rnd(IMAGE_URLS.length);
    while (i2 === i1) i2 = rnd(IMAGE_URLS.length);
    correctImgIndex = i1; correctImgName = IMAGE_NAMES[i1];
    do {
        correctRegion = Math.floor(Math.random() * GRID_ROWS * GRID_COLS) + 1;
    } while (correctRegion === centerIdx);
    slots.single = makeSlot(centerIdx); slotImg.single = loadedImages[i1]; slotVis.single = true;
    slotVis.left = false; slotVis.right = false;
    hintImg = loadedImages[i1]; hintRegion = correctRegion; hintVisible = true;
    render(); await sleep(SHOW_SINGLE_MS);
    slotVis.single = false; hintVisible = false; render(); await sleep(GAP_BEFORE_PAIR);
    if (Math.random() < 0.5) {
        slotImg.left = loadedImages[i2]; slotImg.right = loadedImages[i1]; correctSide = "right";
    } else {
        slotImg.left = loadedImages[i1]; slotImg.right = loadedImages[i2]; correctSide = "left";
    }
    slots.left = makeSlot(leftIdx); slots.right = makeSlot(rightIdx);
    slotVis.left = slotVis.right = true; render();
    clickPhase = 1; gameActive = true;
}
async function handleCorrectLocation() {
    slotVis.left = false; slotVis.right = false;
    const img = loadedImages[correctImgIndex];
    bigSlot = makeBigSlot(img); bigImg = img; bigVis = true;
    nameBelowText = correctImgName; nameBelowVisible = true; render();
    await playAudio(correctImgIndex);
    await sleep(CORRECT_FLASH_MS);
    bigVis = false; nameBelowVisible = false; render();
    await sleep(300); phaseOne();
}
function hitTest(gx, gy, r) { return r && gx>=r.x && gx<=r.x+r.w && gy>=r.y && gy<=r.y+r.h; }
function handleTap(px, py) {
    if (!gameActive) return;
    const g = toGame(px, py), gx = g.x, gy = g.y;
    if (clickPhase === 1) {
        const hl = hitTest(gx, gy, slots.left), hr = hitTest(gx, gy, slots.right);
        if (!hl && !hr) return;
        gameActive = false; const side = hl ? "left" : "right";
        if (side !== correctSide) {
            slotVis.left = slotVis.right = false;
            feedbackText = "WRONG\nIMAGE"; feedbackVisible = true; render();
            sleep(WRONG_IMG_MS).then(() => { feedbackVisible = false; render(); sleep(300).then(phaseOne); });
        } else {
            if (side === "left") slotVis.right = false; else slotVis.left = false;
            render(); clickPhase = 2; gameActive = true;
        }
    } else if (clickPhase === 2) {
        gameActive = false; const region = getRegion(gx, gy);
        if (region === correctRegion) handleCorrectLocation();
        else {
            slotVis.left = slotVis.right = false;
            feedbackText = "WRONG"; feedbackVisible = true; render();
            sleep(INCORRECT_MS).then(() => { feedbackVisible = false; render(); sleep(300).then(phaseOne); });
        }
    }
}

window.addEventListener("resize", () => { setupLayout(); render(); });
window.addEventListener("orientationchange", () => { setTimeout(() => { setupLayout(); render(); }, 300); });

// -- init ------------------------------------------------------------------
fetch("assets.json").then(r => r.json()).then(data => {
    allSets = data.sets;
    buildMenuItems();
    loadSet(allSets[activeSetIndex], () => { setupLayout(); render(); phaseOne(); });
}).catch(err => {
    console.error("Failed to load assets.json", err);
    ctx.fillStyle = "#fff"; ctx.font = "20px Arial";
    ctx.fillText("Error loading assets.json", 20, 40);
});
</script>
</body>
</html>
