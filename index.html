<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Brain Training</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow: hidden; touch-action: manipulation; background: #000; }
        #rotateWrap { position: fixed; top: 0; left: 0; }
        #gameCanvas { display: block; }

        #menuBtn {
            position: fixed;
            bottom: 14px; right: 14px;
            z-index: 999;
            width: 48px; height: 48px;
            background: rgba(30,30,30,0.82);
            border: none; border-radius: 10px;
            cursor: pointer;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 6px; padding: 10px;
            touch-action: manipulation;
        }
        #menuBtn span { display: block; width: 100%; height: 3px; background: #fff; border-radius: 2px; }
        #menuBtn.open { background: rgba(30,30,30,0.97); }

        #menuPanel {
            position: fixed;
            bottom: 70px; right: 14px;
            z-index: 998;
            background: rgba(25,25,25,0.96);
            border-radius: 10px; overflow: hidden;
            display: none; flex-direction: column;
            min-width: 180px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
        }
        #menuPanel.open { display: flex; }

        .menu-item {
            padding: 13px 18px;
            color: #fff;
            font: 15px Arial, sans-serif;
            cursor: pointer; white-space: nowrap;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover, .menu-item:active { background: rgba(255,255,255,0.12); }
        .menu-item.active-set { color: #6f6; }
        .menu-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 2px 0; }

        /*
         * videoWrap: inside rotateWrap so it shares rotation transform.
         * Spans cols 2-4, ALL 5 rows → 3 cells wide × 5 cells tall.
         * overflow:hidden + oversized iframe crops YT black bars.
         */
        #videoWrap {
            display: none;
            position: absolute;
            z-index: 10;
            overflow: hidden;
            background: #000;
        }
        #videoWrap.open { display: block; }

        #videoIframe {
            position: absolute;
            border: none;
            pointer-events: auto;
        }

        #closeVideoBtn {
            position: absolute;
            top: 6px; right: 6px;
            z-index: 20;
            background: rgba(20,20,20,0.85);
            color: #fff;
            border: none; border-radius: 7px;
            font-size: 18px;
            width: 34px; height: 34px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
        }
    </style>
</head>
<body>

<div id="rotateWrap">
    <canvas id="gameCanvas"></canvas>

    <div id="videoWrap">
        <button id="closeVideoBtn" aria-label="Close">✕</button>
        <iframe id="videoIframe" src=""
            allow="autoplay; encrypted-media; gyroscope"
            allowfullscreen>
        </iframe>
    </div>
</div>

<button id="menuBtn" aria-label="Menu">
    <span></span><span></span><span></span>
</button>

<div id="menuPanel">
    <div class="menu-item" id="miPlay">▶&nbsp;&nbsp;Play</div>
    <div class="menu-item" id="miConfig">⚙&nbsp;&nbsp;Config</div>
    <div class="menu-item" id="miHelp">?&nbsp;&nbsp;Help</div>
    <div class="menu-divider" id="miDivider"></div>
</div>

<script>
    let IMAGE_URLS  = [];
    let IMAGE_NAMES = [];
    let AUDIO_FILES = [];
    let allSets        = [];
    let activeSetIndex = 0;

    const GRID_LINES       = 4;
    const GRID_COLS        = GRID_LINES + 1;
    const GRID_ROWS        = GRID_LINES + 1;
    const SHOW_SINGLE_MS   = 1000;
    const GAP_BEFORE_PAIR  = 500;
    const CORRECT_FLASH_MS = 1500;
    const INCORRECT_MS     = 3000;
    const WRONG_IMG_MS     = 500;
    const IMG_PAD          = 6;

    // YT iframe overscale: push black bars outside overflow:hidden clip.
    // Shorts are 9:16 inside a 16:9 iframe → content is ~(9/16)^2 ≈ 31.6% of area.
    // Scale the iframe so that 31.6% fills the container → scale ≈ 1/0.5625 ≈ 1.78
    // We go a bit higher to be safe.
    const YT_SCALE = 1.82;

    let canvas    = document.getElementById("gameCanvas");
    let ctx       = canvas.getContext("2d");
    let wrap      = document.getElementById("rotateWrap");
    let menuBtn   = document.getElementById("menuBtn");
    let menuPanel = document.getElementById("menuPanel");

    let GW, GH, cellW, cellH, imgW, imgH;
    let isPortrait, bgColor;

    let loadedImages  = [];
    let clickPhase    = 0;
    let correctRegion = 0, correctImgName = "";
    let correctImgIndex = 0;
    let correctSide   = "", gameActive = false;

    let slots   = { single:null, left:null, right:null };
    let slotImg = { single:null, left:null, right:null };
    let slotVis = { single:false, left:false, right:false };

    let bigSlot = null, bigImg = null, bigVis = false;

    // Phase-1: small thumbnail in target cell (replaces text label entirely)
    let hintVisible = false;
    let hintImg     = null;
    let hintRegion  = 0;

    let nameBelowVisible = false, nameBelowText = "";
    let feedbackVisible  = false, feedbackText  = "";
    let currentAudio     = null;

    // -------------------------------------------------------
    // VIDEO
    // -------------------------------------------------------
    const VIDEO_ID      = "X_dvUgqe9DI";
    const VID_START     = 4;
    const VID_END       = 10;

    const videoWrap     = document.getElementById("videoWrap");
    const videoIframe   = document.getElementById("videoIframe");
    const closeVideoBtn = document.getElementById("closeVideoBtn");
    let   loopTimer     = null;

    // Container: cols 2-4 (x = cellW..cellW*4), all rows (y = 0..GH)
    // That's 3 cells wide × full height — gives maximum video size
    // while still leaving col 1 and col 5 as visible game context.
    function positionVideoWrap() {
        let cw = Math.floor(cellW * 3);   // 3 cells wide
        let ch = Math.floor(GH);          // full game height
        let cx = Math.floor(cellW);       // start at col 2
        let cy = 0;

        videoWrap.style.left   = cx + "px";
        videoWrap.style.top    = cy + "px";
        videoWrap.style.width  = cw + "px";
        videoWrap.style.height = ch + "px";

        // Shorts are 9:16 portrait inside a landscape iframe.
        // We want the actual portrait content to fill our container.
        // Iframe is 16:9 landscape. Content column is 9/16 of iframe width.
        // To make that column = cw:  iframeW = cw * (16/9)
        // Then iframeH = iframeW * (9/16) = cw  ... but we want height = ch
        // Best approach: fit a 9:16 rect inside cw×ch, then overscale iframe
        // so its 9:16 content region exactly covers that rect.

        // Content aspect for a Short = 9:16 (portrait)
        // Iframe aspect = 16:9 (landscape)
        // Content width inside iframe = iframe_w * (9/16)
        // Content height inside iframe = iframe_h (full height)
        // We want content_w >= cw AND content_h >= ch → find minimum iframe size.

        // If we set iframe_h = ch * YT_SCALE:
        //   iframe_w = iframe_h * (16/9)
        //   content_w = iframe_w * (9/16) = iframe_h = ch * YT_SCALE  ← might be > cw ✓
        let fh = Math.round(ch * YT_SCALE);
        let fw = Math.round(fh * 16 / 9);
        let fx = Math.round((cw - fw) / 2);
        let fy = Math.round((ch - fh) / 2);

        videoIframe.style.width  = fw + "px";
        videoIframe.style.height = fh + "px";
        videoIframe.style.left   = fx + "px";
        videoIframe.style.top    = fy + "px";
    }

    function openVideo() {
        closeMenu();
        positionVideoWrap();
        let src = "https://www.youtube.com/embed/" + VIDEO_ID
                + "?autoplay=1"
                + "&start=" + VID_START
                + "&enablejsapi=1"
                + "&rel=0"
                + "&modestbranding=1"
                + "&controls=0"
                + "&playsinline=1"
                + "&mute=0";
        videoIframe.src = src;
        videoWrap.classList.add("open");

        loopTimer = setInterval(() => {
            try {
                videoIframe.contentWindow.postMessage(
                    JSON.stringify({ event:"command", func:"getCurrentTime", args:[] }), "*"
                );
            } catch(e) {}
        }, 300);
    }

    function closeVideo() {
        videoWrap.classList.remove("open");
        videoIframe.src = "";
        if (loopTimer) { clearInterval(loopTimer); loopTimer = null; }
    }

    window.addEventListener("message", ev => {
        if (!videoWrap.classList.contains("open")) return;
        try {
            let d = (typeof ev.data === "string") ? JSON.parse(ev.data) : ev.data;
            if (d && d.info && typeof d.info.currentTime === "number") {
                if (d.info.currentTime >= VID_END) {
                    videoIframe.contentWindow.postMessage(
                        JSON.stringify({ event:"command", func:"seekTo",
                                         args:[VID_START, true] }), "*"
                    );
                }
            }
        } catch(e) {}
    });

    closeVideoBtn.addEventListener("pointerup", e => { e.stopPropagation(); closeVideo(); });

    // -------------------------------------------------------
    // MENU
    // -------------------------------------------------------
    function addMenuAction(id, fn) {
        document.getElementById(id).addEventListener("pointerup", e => {
            e.stopPropagation(); fn();
        });
    }

    function buildMenuItems() {
        document.querySelectorAll(".menu-set-item").forEach(el => el.remove());
        allSets.forEach((set, i) => {
            let el = document.createElement("div");
            el.className = "menu-item menu-set-item" +
                           (i === activeSetIndex ? " active-set" : "");
            el.textContent = (i === activeSetIndex ? "✓  " : "     ") + set.name;
            el.addEventListener("pointerup", e => { e.stopPropagation(); switchSet(i); });
            menuPanel.appendChild(el);
        });
    }

    function closeMenu() {
        menuPanel.classList.remove("open");
        menuBtn.classList.remove("open");
    }

    menuBtn.addEventListener("pointerup", e => {
        e.stopPropagation();
        let isOpen = menuPanel.classList.toggle("open");
        menuBtn.classList.toggle("open", isOpen);
    });
    menuPanel.addEventListener("pointerup", e => e.stopPropagation());

    addMenuAction("miPlay",   () => openVideo());
    addMenuAction("miConfig", () => { closeMenu(); alert("Config — coming soon"); });
    addMenuAction("miHelp",   () => { closeMenu(); alert("Help — coming soon"); });

    function handleDocPointerUp(e) {
        if (menuPanel.classList.contains("open")) { closeMenu(); return; }
        handleTap(e.clientX, e.clientY);
    }
    document.addEventListener("pointerup", handleDocPointerUp);

    // -------------------------------------------------------
    // LAYOUT
    // -------------------------------------------------------
    function setupLayout() {
        let pw = window.innerWidth;
        let ph = window.innerHeight;
        isPortrait = pw < ph;
        let isMobile = Math.min(pw, ph) < 600;
        bgColor = isMobile ? "#7ab8e8" : "#ffffff";

        if (isPortrait) {
            GW = ph; GH = pw;
            canvas.width  = GW; canvas.height = GH;
            wrap.style.width  = GW + "px";
            wrap.style.height = GH + "px";
            wrap.style.transformOrigin = "0 0";
            wrap.style.transform = "rotate(90deg) translateY(-" + pw + "px)";
        } else {
            GW = pw; GH = ph;
            canvas.width  = GW; canvas.height = GH;
            wrap.style.width  = GW + "px";
            wrap.style.height = GH + "px";
            wrap.style.transformOrigin = "0 0";
            wrap.style.transform = "none";
        }

        cellW = GW / GRID_COLS;
        cellH = GH / GRID_ROWS;

        let maxW = cellW - IMG_PAD * 2;
        let maxH = cellH - IMG_PAD * 2;
        if (maxW * 9 / 16 <= maxH) {
            imgW = Math.floor(maxW);
            imgH = Math.floor(maxW * 9 / 16);
        } else {
            imgH = Math.floor(maxH);
            imgW = Math.floor(maxH * 16 / 9);
        }

        if (videoWrap.classList.contains("open")) positionVideoWrap();
    }

    function toGame(px, py) {
        if (isPortrait) return { x: py, y: window.innerWidth - px };
        return { x: px, y: py };
    }

    function getCenter(idx) {
        let row = Math.floor((idx-1)/GRID_COLS)+1;
        let col = ((idx-1)%GRID_COLS)+1;
        return { x:(col-0.5)*cellW, y:(row-0.5)*cellH };
    }

    function getRegion(gx, gy) {
        let col = Math.floor(gx/cellW)+1;
        let row = Math.floor(gy/cellH)+1;
        if (col<1||col>GRID_COLS||row<1||row>GRID_ROWS) return 0;
        return (row-1)*GRID_COLS+col;
    }

    let centerIdx = ((Math.ceil(GRID_ROWS/2)-1)*GRID_COLS)+Math.ceil(GRID_COLS/2);
    let leftIdx   = centerIdx - 1;
    let rightIdx  = centerIdx + 1;

    function makeSlot(idx) {
        let c = getCenter(idx);
        return { x:Math.floor(c.x-imgW/2), y:Math.floor(c.y-imgH/2), w:imgW, h:imgH };
    }

    function makeBigSlot(img) {
        let boxX=cellW, boxY=cellH, boxW=cellW*3, boxH=cellH*3;
        let iw=img.naturalWidth||img.width||boxW;
        let ih=img.naturalHeight||img.height||boxH;
        let scale=Math.min(boxW/iw, boxH/ih);
        let dw=Math.floor(iw*scale), dh=Math.floor(ih*scale);
        return { x:Math.floor(boxX+(boxW-dw)/2), y:Math.floor(boxY+(boxH-dh)/2), w:dw, h:dh };
    }

    function getLabelZone() {
        return { cx:cellW*2.5, cy:cellH*4.5, zoneW:cellW*3, zoneH:cellH };
    }

    // -------------------------------------------------------
    // DRAWING
    // -------------------------------------------------------
    function drawImg(img, r) {
        ctx.save();
        ctx.beginPath(); ctx.rect(r.x,r.y,r.w,r.h); ctx.clip();
        ctx.drawImage(img, r.x,r.y,r.w,r.h);
        ctx.restore();
        ctx.strokeStyle="#333"; ctx.lineWidth=2;
        ctx.strokeRect(r.x,r.y,r.w,r.h);
    }

    function drawBigImg(img, r) {
        ctx.drawImage(img, r.x,r.y,r.w,r.h);
        ctx.strokeStyle="#333"; ctx.lineWidth=2;
        ctx.strokeRect(r.x,r.y,r.w,r.h);
    }

    // 20% thumbnail centred in the target cell — NO text at all
    function drawHint(img, regionIdx) {
        let c  = getCenter(regionIdx);
        let tw = Math.floor(imgW * 0.20);
        let th = Math.floor(imgH * 0.20);
        let tx = Math.floor(c.x - tw / 2);
        let ty = Math.floor(c.y - th / 2);
        ctx.drawImage(img, tx, ty, tw, th);
        ctx.strokeStyle = "rgba(0,0,0,0.6)";
        ctx.lineWidth   = 1;
        ctx.strokeRect(tx, ty, tw, th);
    }

    function drawFittedLabel(text, cx, cy, maxW, maxH, bg, fg) {
        let pad = 10, fs = Math.floor(maxH * 0.275);
        ctx.font = "bold " + fs + "px Arial";
        while (fs > 4 && ctx.measureText(text).width > maxW - pad*2) {
            fs--; ctx.font = "bold " + fs + "px Arial";
        }
        let tw = ctx.measureText(text).width;
        let bw = tw+pad*2, bh = fs+pad*2;
        let bx = Math.max(2, Math.min(cx-bw/2, GW-bw-2));
        let by = Math.max(2, Math.min(cy-bh/2, GH-bh-2));
        ctx.fillStyle = bg; ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(bx,by,bw,bh,6); else ctx.rect(bx,by,bw,bh);
        ctx.fill(); ctx.fillStyle = fg;
        ctx.fillText(text, bx+pad, by+pad+fs*0.85);
    }

    function drawFeedback(text) {
        let fs = Math.max(12, Math.floor(GH/10));
        ctx.font = "bold " + fs + "px Arial";
        let lines = text.split("\\n"), maxW = 0;
        lines.forEach(l => { let m=ctx.measureText(l).width; if(m>maxW) maxW=m; });
        let pad=24, bw=maxW+pad*2, bh=(fs+10)*lines.length+pad*2;
        let bx=GW/2-bw/2, by=GH/2-bh/2;
        ctx.fillStyle="rgba(255,60,60,0.97)"; ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(bx,by,bw,bh,10); else ctx.rect(bx,by,bw,bh);
        ctx.fill(); ctx.fillStyle="#fff";
        lines.forEach((l,i) => ctx.fillText(l, GW/2-ctx.measureText(l).width/2,
            by+pad+fs*0.85+i*(fs+10)));
    }

    function render() {
        ctx.fillStyle = bgColor;
        ctx.fillRect(0,0,GW,GH);

        // Grid lines
        ctx.strokeStyle="#000"; ctx.lineWidth=1;
        for (let i=1;i<=GRID_LINES;i++) {
            let x=GW*i/(GRID_LINES+1);
            ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,GH);ctx.stroke();
        }
        for (let i=1;i<=GRID_LINES;i++) {
            let y=GH*i/(GRID_LINES+1);
            ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(GW,y);ctx.stroke();
        }

        // Images
        ["single","left","right"].forEach(k => {
            if (slotVis[k]&&slotImg[k]&&slots[k]) drawImg(slotImg[k],slots[k]);
        });

        // Big reveal image
        if (bigVis&&bigImg&&bigSlot) drawBigImg(bigImg,bigSlot);

        // Phase-1 hint: 20% thumbnail in target cell — NO label text
        if (hintVisible && hintImg) drawHint(hintImg, hintRegion);

        // Name below big image after correct answer
        if (nameBelowVisible) {
            let z = getLabelZone();
            drawFittedLabel(nameBelowText,z.cx,z.cy,z.zoneW,z.zoneH,
                "rgba(60,180,60,0.97)","#fff");
        }

        // Wrong feedback
        if (feedbackVisible) drawFeedback(feedbackText);
    }

    // -------------------------------------------------------
    // AUDIO
    // -------------------------------------------------------
    function playAudio(idx) {
        return new Promise(resolve => {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime=0; }
            let src = AUDIO_FILES[idx];
            if (!src) { resolve(); return; }
            currentAudio = new Audio(src);
            currentAudio.onended = resolve;
            currentAudio.onerror = resolve;
            currentAudio.play().catch(resolve);
        });
    }

    function sleep(ms) { return new Promise(r => setTimeout(r,ms)); }
    function rnd(n)    { return Math.floor(Math.random()*n); }

    // -------------------------------------------------------
    // ASSET LOADING
    // -------------------------------------------------------
    function preloadImages(cb) {
        if (!IMAGE_URLS.length) { cb(); return; }
        loadedImages = new Array(IMAGE_URLS.length);
        let n = 0;
        IMAGE_URLS.forEach((url,i) => {
            let img = new Image();
            img.onload = img.onerror = () => { if (++n===IMAGE_URLS.length) cb(); };
            img.src = url; loadedImages[i] = img;
        });
    }

    function loadSet(set, cb) {
        IMAGE_URLS  = set.items.map(it => `${set.folder}/${it.base}.jpg`);
        IMAGE_NAMES = set.items.map(it => it.label);
        AUDIO_FILES = set.items.map(it => `${set.folder}/${it.base}.mp3`);
        loadedImages = [];
        preloadImages(cb);
    }

    function switchSet(i) {
        closeMenu();
        if (i === activeSetIndex) return;
        activeSetIndex = i;
        gameActive = false;
        buildMenuItems();
        loadSet(allSets[i], () => { setupLayout(); render(); phaseOne(); });
    }

    // -------------------------------------------------------
    // GAME
    // -------------------------------------------------------
    async function phaseOne() {
        gameActive = false; clickPhase = 0;
        setupLayout();
        bigVis = false; bigImg = null; bigSlot = null;
        nameBelowVisible = false;
        hintVisible = false;   // ← reset hint
        feedbackVisible = false;

        let i1=rnd(IMAGE_URLS.length), i2=rnd(IMAGE_URLS.length);
        while (i2===i1) i2=rnd(IMAGE_URLS.length);

        correctImgIndex = i1;
        correctImgName  = IMAGE_NAMES[i1];
        correctRegion   = Math.floor(Math.random()*GRID_ROWS*GRID_COLS)+1;

        // Show primary image in centre + 20% hint thumbnail in target cell
        slots.single  = makeSlot(centerIdx);
        slotImg.single = loadedImages[i1];
        slotVis.single = true;
        slotVis.left   = false;
        slotVis.right  = false;

        hintImg     = loadedImages[i1];   // same image, smaller
        hintRegion  = correctRegion;
        hintVisible = true;               // ← draw thumbnail, NOT text

        render();
        await sleep(SHOW_SINGLE_MS);

        // Hide both before showing pair
        slotVis.single = false;
        hintVisible    = false;
        render();
        await sleep(GAP_BEFORE_PAIR);

        if (Math.random() < 0.5) {
            slotImg.left=loadedImages[i2]; slotImg.right=loadedImages[i1];
            correctSide="right";
        } else {
            slotImg.left=loadedImages[i1]; slotImg.right=loadedImages[i2];
            correctSide="left";
        }
        slots.left  = makeSlot(leftIdx);
        slots.right = makeSlot(rightIdx);
        slotVis.left = slotVis.right = true;
        render(); clickPhase=1; gameActive=true;
    }

    async function handleCorrectLocation() {
        slotVis.left=false; slotVis.right=false;
        let img=loadedImages[correctImgIndex];
        bigSlot=makeBigSlot(img); bigImg=img; bigVis=true;
        nameBelowText=correctImgName; nameBelowVisible=true;
        render();
        await playAudio(correctImgIndex);
        await sleep(CORRECT_FLASH_MS);
        bigVis=false; nameBelowVisible=false;
        render(); await sleep(300); phaseOne();
    }

    function hitTest(gx,gy,r) {
        return r&&gx>=r.x&&gx<=r.x+r.w&&gy>=r.y&&gy<=r.y+r.h;
    }

    function handleTap(px, py) {
        if (!gameActive) return;
        if (videoWrap.classList.contains("open")) return;
        let g=toGame(px,py), gx=g.x, gy=g.y;
        if (clickPhase===1) {
            let hl=hitTest(gx,gy,slots.left), hr=hitTest(gx,gy,slots.right);
            if (!hl&&!hr) return;
            gameActive=false;
            let side=hl?"left":"right";
            if (side!==correctSide) {
                slotVis.left=slotVis.right=false;
                feedbackText="WRONG\\nIMAGE"; feedbackVisible=true; render();
                sleep(WRONG_IMG_MS).then(()=>{feedbackVisible=false;render();sleep(300).then(phaseOne);});
            } else {
                if (side==="left") slotVis.right=false; else slotVis.left=false;
                render(); clickPhase=2; gameActive=true;
            }
        } else if (clickPhase===2) {
            gameActive=false;
            let region=getRegion(gx,gy);
            if (region===correctRegion) {
                handleCorrectLocation();
            } else {
                slotVis.left=slotVis.right=false;
                feedbackText="WRONG"; feedbackVisible=true; render();
                sleep(INCORRECT_MS).then(()=>{feedbackVisible=false;render();sleep(300).then(phaseOne);});
            }
        }
    }

    window.addEventListener("resize", ()=>{ setupLayout(); render(); });
    window.addEventListener("orientationchange", ()=>{ setTimeout(()=>{ setupLayout(); render(); },350); });

    // -------------------------------------------------------
    // STARTUP
    // -------------------------------------------------------
    fetch("assets.json?v=" + Date.now())
        .then(r => r.json())
        .then(data => {
            allSets = data.sets || [];
            if (!allSets.length) throw new Error("No sets in assets.json");
            activeSetIndex = 0;
            buildMenuItems();
            loadSet(allSets[0], ()=>{ setupLayout(); render(); phaseOne(); });
        })
        .catch(err => {
            console.error("assets.json error:", err);
            setupLayout();
            ctx.fillStyle="#fff"; ctx.fillRect(0,0,GW||400,GH||300);
            ctx.fillStyle="#c00"; ctx.font="bold 18px Arial";
            ctx.fillText("Error: could not load assets.json",20,(GH||300)/2);
        });
</script>
</body>
</html>
