<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brain Training</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
            background-color: white;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .image-container {
            position: absolute;
            display: none;
        }
        .image-container img {
            border: 2px solid #333;
            display: block;
        }
        .label {
            position: absolute;
            background-color: rgba(200, 200, 200, 0.9);
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            display: none;
            min-width: 80px;
            text-align: center;
            z-index: 100;
        }
        #labelBelow {
            position: absolute;
            background-color: rgba(100, 200, 100, 0.95);
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            display: none;
            min-width: 120px;
            text-align: center;
            color: white;
            z-index: 100;
        }
        #feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 100, 100, 0.95);
            color: white;
            padding: 20px 40px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            white-space: pre-line;
            display: none;
            z-index: 200;
            min-width: 200px;
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gridCanvas"></canvas>

    <div class="image-container" id="singleImage">
        <img src="" alt="Fish">
    </div>
    <div class="image-container" id="leftImage">
        <img src="" alt="Fish Left">
    </div>
    <div class="image-container" id="rightImage">
        <img src="" alt="Fish Right">
    </div>

    <div class="label" id="showLabel"></div>
    <div id="labelBelow"></div>
    <div id="feedback"></div>
</div>

<script>
    // ============================================================
    // EDIT THESE to match your exact filenames in /images folder
    // ============================================================
    const IMAGE_URLS = [
        "images/sea-bass.jpg",
        "images/largemouth-bass.jpg",
        "images/perch.jpg",
        "images/gar.jpg",
        "images/soy.jpg",
        "images/bluegill.jpg"
    ];
    const IMAGE_NAMES = [
        "sea bass",
        "largemouth bass",
        "perch",
        "gar",
        "soy",
        "bluegill"
    ];
    // ============================================================

    const GRID_LINES       = 4;
    const GRID_COLS        = GRID_LINES + 1;
    const GRID_ROWS        = GRID_LINES + 1;
    const SHOW_SINGLE_MS   = 1000;
    const GAP_BEFORE_PAIR  = 500;
    const CORRECT_FLASH_MS = 3000;
    const INCORRECT_MS     = 3000;
    const WRONG_IMG_MS     = 500;
    const BELOW_RIGHT      = 10;
    const IMG_PADDING      = 10;   // pixels of padding inside each cell

    // ---- Screen + cell dimensions (recalculated on resize/rotate) ----
    let screenW, screenH, cellW, cellH, imgW, imgH;

    function recalcDimensions() {
        screenW = window.innerWidth;
        screenH = window.innerHeight;
        cellW   = screenW / GRID_COLS;
        cellH   = screenH / GRID_ROWS;

        // Image fills cell minus padding, keeping 16:9 ratio
        let maxW = cellW - IMG_PADDING * 2;
        let maxH = cellH - IMG_PADDING * 2;
        // fit 16:9 within maxW x maxH
        if (maxW / 16 * 9 <= maxH) {
            imgW = Math.floor(maxW);
            imgH = Math.floor(maxW / 16 * 9);
        } else {
            imgH = Math.floor(maxH);
            imgW = Math.floor(maxH / 9 * 16);
        }

        let canvas    = document.getElementById("gridCanvas");
        canvas.width  = screenW;
        canvas.height = screenH;

        // Update font sizes responsively
        let fontSize = Math.max(10, Math.floor(cellW / 10));
        document.getElementById("showLabel").style.fontSize  = fontSize + "px";
        document.getElementById("labelBelow").style.fontSize = fontSize + "px";
        document.getElementById("feedback").style.fontSize   = Math.max(18, fontSize * 2) + "px";
    }

    // ---- Grid helpers ----
    function getRegionCenter(idx) {
        let row = Math.floor((idx - 1) / GRID_COLS) + 1;
        let col = ((idx - 1) % GRID_COLS) + 1;
        return {
            x: (col - 0.5) * cellW,
            y: (row - 0.5) * cellH
        };
    }

    function getRegionFromMouse(mx, my) {
        let col = Math.floor(mx / cellW) + 1;
        let row = Math.floor(my / cellH) + 1;
        if (col < 1 || col > GRID_COLS || row < 1 || row > GRID_ROWS) return 0;
        return (row - 1) * GRID_COLS + col;
    }

    let centerIdx = ((Math.ceil(GRID_ROWS / 2) - 1) * GRID_COLS) + Math.ceil(GRID_COLS / 2);
    let leftIdx   = centerIdx - 1;
    let rightIdx  = centerIdx + 1;

    // ---- Draw grid ----
    function drawGrid() {
        let canvas = document.getElementById("gridCanvas");
        let ctx    = canvas.getContext("2d");
        ctx.clearRect(0, 0, screenW, screenH);
        ctx.strokeStyle = "#000000";
        ctx.lineWidth   = 1;
        for (let i = 1; i <= GRID_LINES; i++) {
            let x = screenW * i / (GRID_LINES + 1);
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, screenH); ctx.stroke();
        }
        for (let i = 1; i <= GRID_LINES; i++) {
            let y = screenH * i / (GRID_LINES + 1);
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(screenW, y); ctx.stroke();
        }
    }

    // ---- Place image container centered on grid cell ----
    function placeAt(containerId, idx) {
        let c  = getRegionCenter(idx);
        let el = document.getElementById(containerId);
        let img = el.querySelector("img");
        img.width  = imgW;
        img.height = imgH;
        el.style.left = (c.x - imgW / 2) + "px";
        el.style.top  = (c.y - imgH / 2) + "px";
    }

    // ---- TTS with fish-name fixes ----
    function speak(text) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        let fixes = {
            "sea bass": "see bhass",
            "bass":     "bhass",
            "perch":    "purch",
            "gar":      "garr",
            "soy":      "soe"
        };
        let sorted = Object.keys(fixes).sort((a, b) => b.length - a.length);
        for (let wrong of sorted) {
            let re = new RegExp("\\b" + wrong + "\\b", "gi");
            text = text.replace(re, fixes[wrong]);
        }
        let u = new SpeechSynthesisUtterance(text);
        u.rate = 0.9; u.volume = 1;
        window.speechSynthesis.speak(u);
    }

    // ---- Feedback ----
    function showFeedback(msg) {
        document.getElementById("feedback").textContent = msg;
        document.getElementById("feedback").style.display = "block";
    }
    function hideFeedback() {
        document.getElementById("feedback").style.display = "none";
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function rnd(n)    { return Math.floor(Math.random() * n); }

    // ============================================================
    // PHASE ONE
    // ============================================================
    let clickPhase     = 0;
    let correctRegion  = 0;
    let correctImgName = "";
    let correctSide    = "";
    let nameLabelX     = 0;
    let nameLabelY     = 0;
    let gameActive     = false;

    async function phaseOne() {
        gameActive = false;
        clickPhase = 0;

        recalcDimensions();   // always refresh sizes at start of each round

        let i1 = rnd(IMAGE_URLS.length);
        let i2 = rnd(IMAGE_URLS.length);
        while (i2 === i1) i2 = rnd(IMAGE_URLS.length);

        correctImgName = IMAGE_NAMES[i1];
        correctRegion  = Math.floor(Math.random() * GRID_ROWS * GRID_COLS) + 1;
        let lc = getRegionCenter(correctRegion);

        placeAt("singleImage", centerIdx);
        document.getElementById("singleImage").querySelector("img").src = IMAGE_URLS[i1];

        let lbl = document.getElementById("showLabel");
        lbl.textContent = correctImgName;
        lbl.style.left  = (lc.x - cellW * 0.3) + "px";
        lbl.style.top   = (lc.y - cellH * 0.1) + "px";
        lbl.style.maxWidth = (cellW * 0.8) + "px";

        drawGrid();
        document.getElementById("singleImage").style.display = "block";
        lbl.style.display = "block";

        await sleep(SHOW_SINGLE_MS);

        document.getElementById("singleImage").style.display = "none";
        lbl.style.display = "none";
        drawGrid();
        await sleep(GAP_BEFORE_PAIR);

        // Phase 2: show pair
        let leftFile, rightFile;
        if (Math.random() < 0.5) {
            leftFile    = IMAGE_URLS[i2];
            rightFile   = IMAGE_URLS[i1];
            correctSide = "right";
        } else {
            leftFile    = IMAGE_URLS[i1];
            rightFile   = IMAGE_URLS[i2];
            correctSide = "left";
        }

        placeAt("leftImage",  leftIdx);
        placeAt("rightImage", rightIdx);
        document.getElementById("leftImage").querySelector("img").src  = leftFile;
        document.getElementById("rightImage").querySelector("img").src = rightFile;

        drawGrid();
        document.getElementById("leftImage").style.display  = "block";
        document.getElementById("rightImage").style.display = "block";

        clickPhase = 1;
        gameActive = true;
    }

    // ============================================================
    // CLICK / TAP HANDLER
    // ============================================================
    document.addEventListener("click", async function(e) {
        if (!gameActive) return;

        if (clickPhase === 1) {
            let leftEl  = document.getElementById("leftImage");
            let rightEl = document.getElementById("rightImage");
            let lr = leftEl.getBoundingClientRect();
            let rr = rightEl.getBoundingClientRect();

            let hitLeft  = e.clientX >= lr.left && e.clientX <= lr.right &&
                           e.clientY >= lr.top  && e.clientY <= lr.bottom;
            let hitRight = e.clientX >= rr.left && e.clientX <= rr.right &&
                           e.clientY >= rr.top  && e.clientY <= rr.bottom;

            if (!hitLeft && !hitRight) return;

            gameActive = false;
            let clickedSide = hitLeft ? "left" : "right";

            if (clickedSide !== correctSide) {
                leftEl.style.display  = "none";
                rightEl.style.display = "none";
                drawGrid();
                showFeedback("WRONG\nIMAGE");
                await sleep(WRONG_IMG_MS);
                hideFeedback();
                drawGrid();
                await sleep(300);
                phaseOne();
            } else {
                if (clickedSide === "left") {
                    rightEl.style.display = "none";
                    let r = leftEl.getBoundingClientRect();
                    nameLabelX = r.left + BELOW_RIGHT;
                    nameLabelY = r.bottom + BELOW_RIGHT;
                } else {
                    leftEl.style.display = "none";
                    let r = rightEl.getBoundingClientRect();
                    nameLabelX = r.left + BELOW_RIGHT;
                    nameLabelY = r.bottom + BELOW_RIGHT;
                }
                drawGrid();
                clickPhase = 2;
                gameActive = true;
            }
        }

        else if (clickPhase === 2) {
            gameActive = false;
            let region = getRegionFromMouse(e.clientX, e.clientY);

            if (region === correctRegion) {
                let lb = document.getElementById("labelBelow");
                lb.textContent   = correctImgName;
                lb.style.left    = nameLabelX + "px";
                lb.style.top     = nameLabelY + "px";
                lb.style.maxWidth = (cellW * 0.9) + "px";
                lb.style.display = "block";
                drawGrid();
                speak(correctImgName);
                await sleep(CORRECT_FLASH_MS);
                lb.style.display = "none";
                document.getElementById("leftImage").style.display  = "none";
                document.getElementById("rightImage").style.display = "none";
                drawGrid();
                await sleep(300);
                phaseOne();
            } else {
                document.getElementById("leftImage").style.display  = "none";
                document.getElementById("rightImage").style.display = "none";
                drawGrid();
                showFeedback("WRONG");
                await sleep(INCORRECT_MS);
                hideFeedback();
                drawGrid();
                await sleep(300);
                phaseOne();
            }
        }
    });

    // ---- Resize and orientation change ----
    window.addEventListener("resize", function() {
        recalcDimensions();
        drawGrid();
    });

    window.addEventListener("orientationchange", function() {
        setTimeout(function() {
            recalcDimensions();
            drawGrid();
        }, 300);   // small delay lets browser finish rotating
    });

    // ---- Start ----
    recalcDimensions();
    drawGrid();
    phaseOne();
</script>
</body>
</html>
