<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Training</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
            background-color: white;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .image-container {
            position: absolute;
            display: none;
        }
        .image-container img {
            border: 2px solid #333;
            display: block;
        }
        .label {
            position: absolute;
            background-color: rgba(200, 200, 200, 0.9);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            display: none;
            min-width: 150px;
            text-align: center;
            z-index: 100;
        }
        #labelBelow {
            position: absolute;
            background-color: rgba(100, 200, 100, 0.95);
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            display: none;
            min-width: 220px;
            text-align: center;
            color: white;
            z-index: 100;
        }
        #feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 100, 100, 0.95);
            color: white;
            padding: 40px;
            border-radius: 8px;
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            white-space: pre-line;
            display: none;
            z-index: 200;
            min-width: 400px;
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gridCanvas"></canvas>

    <div class="image-container" id="singleImage">
        <img src="" alt="Fish" width="320" height="180">
    </div>
    <div class="image-container" id="leftImage">
        <img src="" alt="Fish Left" width="320" height="180">
    </div>
    <div class="image-container" id="rightImage">
        <img src="" alt="Fish Right" width="320" height="180">
    </div>

    <div class="label" id="showLabel"></div>
    <div id="labelBelow"></div>
    <div id="feedback"></div>
</div>

<script>
    // ============================================================
    // EDIT THESE: exact filenames as uploaded to your /images folder
    // ============================================================
    const IMAGE_URLS = [
//        "images/sea-bass.jpg",
//        "images/bluegill.jpg"
        "images/Garabaldi-Tiny.jpg",
        "images/Red-Phalarope.jpg",
         "images/Red-neck-Phalarope.jpg"

    ];

    // Display names (used for label and speech) — match order above
    const IMAGE_NAMES = [

//        "gar",
//        "soy",
//        "bluegill"
         "Garabaldi Tiny",
         "Red-Phalarope",
         "Red-neck-Phalarope"


    ];
    // ============================================================

    const IMG_WIDTH        = 320;
    const IMG_HEIGHT       = 180;
    const GRID_LINES       = 4;
    const GRID_COLS        = GRID_LINES + 1;   // 5
    const GRID_ROWS        = GRID_LINES + 1;   // 5
    const SHOW_SINGLE_MS   = 1000;
    const GAP_BEFORE_PAIR  = 500;
    const CORRECT_FLASH_MS = 3000;
    const INCORRECT_MS     = 3000;
    const WRONG_IMG_MS     = 500;
    const BELOW_RIGHT      = 20;

    let screenW  = window.innerWidth;
    let screenH  = window.innerHeight;
    let cellW    = screenW / GRID_COLS;
    let cellH    = screenH / GRID_ROWS;

    let canvas   = document.getElementById("gridCanvas");
    let ctx      = canvas.getContext("2d");
    canvas.width  = screenW;
    canvas.height = screenH;

    let clickPhase      = 0;
    let correctRegion   = 0;
    let correctImgName  = "";
    let correctSide     = "";
    let nameLabelX      = 0;
    let nameLabelY      = 0;
    let gameActive      = false;

    // ---- Grid helpers ----
    function getRegionCenter(idx) {
        let row = Math.floor((idx - 1) / GRID_COLS) + 1;
        let col = ((idx - 1) % GRID_COLS) + 1;
        return {
            x: (col - 0.5) * cellW,
            y: (row - 0.5) * cellH
        };
    }

    function getRegionFromMouse(mx, my) {
        let col = Math.floor(mx / cellW) + 1;
        let row = Math.floor(my / cellH) + 1;
        if (col < 1 || col > GRID_COLS || row < 1 || row > GRID_ROWS) return 0;
        return (row - 1) * GRID_COLS + col;
    }

    // Center cell and neighbors (row 3, col 3 in 5x5 = index 13)
    let centerIdx = ((Math.ceil(GRID_ROWS / 2) - 1) * GRID_COLS) + Math.ceil(GRID_COLS / 2);
    let leftIdx   = centerIdx - 1;
    let rightIdx  = centerIdx + 1;

    // ---- Draw grid ----
    function drawGrid() {
        ctx.clearRect(0, 0, screenW, screenH);
        ctx.strokeStyle = "#000000";
        ctx.lineWidth   = 1;
        for (let i = 1; i <= GRID_LINES; i++) {
            let x = screenW * i / (GRID_LINES + 1);
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, screenH); ctx.stroke();
        }
        for (let i = 1; i <= GRID_LINES; i++) {
            let y = screenH * i / (GRID_LINES + 1);
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(screenW, y); ctx.stroke();
        }
    }

    // ---- Position image container at grid cell ----
    function placeAt(containerId, idx) {
        let c   = getRegionCenter(idx);
        let el  = document.getElementById(containerId);
        el.style.left = (c.x - IMG_WIDTH  / 2) + "px";
        el.style.top  = (c.y - IMG_HEIGHT / 2) + "px";
    }

    // ---- TTS with David/Zira fish-name fixes ----
    function speak(text) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        let fixes = {
            "sea bass":       "see bhass",
            "bass":           "bhass",
            "perch":          "purch",
            "gar":            "garr",
            "soy":            "soe"
        };
        // longest first to avoid partial replacement
        let sorted = Object.keys(fixes).sort((a,b) => b.length - a.length);
        for (let wrong of sorted) {
            let re = new RegExp("\\b" + wrong + "\\b", "gi");
            text = text.replace(re, fixes[wrong]);
        }
        let u = new SpeechSynthesisUtterance(text);
        u.rate = 0.9; u.volume = 1;
        window.speechSynthesis.speak(u);
    }

    // ---- Feedback ----
    function showFeedback(msg) {
        let fb = document.getElementById("feedback");
        fb.textContent = msg;
        fb.style.display = "block";
    }
    function hideFeedback() {
        document.getElementById("feedback").style.display = "none";
    }

    // ---- Sleep ----
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ---- Random integer in [0, n) ----
    function rnd(n) { return Math.floor(Math.random() * n); }

    // ============================================================
    // PHASE ONE: show single image + region label
    // ============================================================
    async function phaseOne() {
        gameActive = false;
        clickPhase = 0;

        let i1 = rnd(IMAGE_URLS.length);
        let i2 = rnd(IMAGE_URLS.length);
        while (i2 === i1) i2 = rnd(IMAGE_URLS.length);

        correctImgName = IMAGE_NAMES[i1];

        // pick random region for label
        correctRegion = Math.floor(Math.random() * GRID_ROWS * GRID_COLS) + 1;
        let lc = getRegionCenter(correctRegion);

        // position single image at center cell
        placeAt("singleImage", centerIdx);
        document.getElementById("singleImage").querySelector("img").src = IMAGE_URLS[i1];

        // position label
        let lbl = document.getElementById("showLabel");
        lbl.textContent  = correctImgName;
        lbl.style.left   = (lc.x - 75) + "px";
        lbl.style.top    = (lc.y - 20) + "px";

        drawGrid();
        document.getElementById("singleImage").style.display = "block";
        lbl.style.display = "block";

        await sleep(SHOW_SINGLE_MS);

        document.getElementById("singleImage").style.display = "none";
        lbl.style.display = "none";
        drawGrid();

        await sleep(GAP_BEFORE_PAIR);

        // ---- Phase two: show pair ----
        let leftFile, rightFile;
        if (Math.random() < 0.5) {
            leftFile    = IMAGE_URLS[i2];
            rightFile   = IMAGE_URLS[i1];
            correctSide = "right";
        } else {
            leftFile    = IMAGE_URLS[i1];
            rightFile   = IMAGE_URLS[i2];
            correctSide = "left";
        }

        placeAt("leftImage",  leftIdx);
        placeAt("rightImage", rightIdx);
        document.getElementById("leftImage").querySelector("img").src  = leftFile;
        document.getElementById("rightImage").querySelector("img").src = rightFile;

        drawGrid();
        document.getElementById("leftImage").style.display  = "block";
        document.getElementById("rightImage").style.display = "block";

        clickPhase = 1;
        gameActive = true;
    }

    // ============================================================
    // CLICK HANDLER
    // ============================================================
    document.addEventListener("click", async function(e) {
        if (!gameActive) return;

        // ---- Phase 1 click: pick correct image ----
        if (clickPhase === 1) {
            let leftImg  = document.getElementById("leftImage");
            let rightImg = document.getElementById("rightImage");
            let lr = leftImg.getBoundingClientRect();
            let rr = rightImg.getBoundingClientRect();

            let hitLeft  = e.clientX >= lr.left && e.clientX <= lr.right &&
                           e.clientY >= lr.top  && e.clientY <= lr.bottom;
            let hitRight = e.clientX >= rr.left && e.clientX <= rr.right &&
                           e.clientY >= rr.top  && e.clientY <= rr.bottom;

            if (!hitLeft && !hitRight) return;

            gameActive = false;
            let clickedSide = hitLeft ? "left" : "right";

            if (clickedSide !== correctSide) {
                leftImg.style.display  = "none";
                rightImg.style.display = "none";
                drawGrid();
                showFeedback("WRONG\nIMAGE");
                await sleep(WRONG_IMG_MS);
                hideFeedback();
                drawGrid();
                await sleep(300);
                phaseOne();
            } else {
                // hide wrong image, keep correct one
                if (clickedSide === "left") {
                    rightImg.style.display = "none";
                    let r = leftImg.getBoundingClientRect();
                    nameLabelX = r.left + BELOW_RIGHT;
                    nameLabelY = r.bottom + BELOW_RIGHT;
                } else {
                    leftImg.style.display = "none";
                    let r = rightImg.getBoundingClientRect();
                    nameLabelX = r.left + BELOW_RIGHT;
                    nameLabelY = r.bottom + BELOW_RIGHT;
                }
                drawGrid();
                clickPhase = 2;
                gameActive = true;
            }
        }

        // ---- Phase 2 click: pick correct region ----
        else if (clickPhase === 2) {
            gameActive = false;
            let region = getRegionFromMouse(e.clientX, e.clientY);

            if (region === correctRegion) {
                let lb = document.getElementById("labelBelow");
                lb.textContent  = correctImgName;
                lb.style.left   = nameLabelX + "px";
                lb.style.top    = nameLabelY + "px";
                lb.style.display = "block";
                drawGrid();
                speak(correctImgName);
                await sleep(CORRECT_FLASH_MS);
                lb.style.display = "none";
                document.getElementById("leftImage").style.display  = "none";
                document.getElementById("rightImage").style.display = "none";
                drawGrid();
                await sleep(300);
                phaseOne();
            } else {
                document.getElementById("leftImage").style.display  = "none";
                document.getElementById("rightImage").style.display = "none";
                drawGrid();
                showFeedback("WRONG");
                await sleep(INCORRECT_MS);
                hideFeedback();
                drawGrid();
                await sleep(300);
                phaseOne();
            }
        }
    });

    // ---- Handle resize ----
    window.addEventListener("resize", function() {
        screenW = window.innerWidth;
        screenH = window.innerHeight;
        cellW   = screenW / GRID_COLS;
        cellH   = screenH / GRID_ROWS;
        canvas.width  = screenW;
        canvas.height = screenH;
        drawGrid();
    });

    // ---- Start ----
    drawGrid();
    phaseOne();
</script>
</body>
</html>
