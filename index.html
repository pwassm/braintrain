<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brain Training</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }
        #gameContainer {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }
        #gameCanvas {
            position: absolute;
            top: 0; left: 0;
        }
        #feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 60, 60, 0.97);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            font-weight: bold;
            text-align: center;
            white-space: pre-line;
            display: none;
            z-index: 300;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="feedback"></div>
</div>

<script>
    // ============================================================
    const IMAGE_URLS = [
        "images/Garabaldi-Tiny.jpg",
        "images/Red-Phalarope.jpg",
        "images/Red-neck-Phalarope.jpg"
    ];
    const IMAGE_NAMES = [
        "Garibaldi",
        "Red Phalarope",
        "Red-necked Phalarope"
    ];
    // ============================================================

    const GRID_LINES       = 4;
    const GRID_COLS        = GRID_LINES + 1;
    const GRID_ROWS        = GRID_LINES + 1;
    const SHOW_SINGLE_MS   = 1000;
    const GAP_BEFORE_PAIR  = 500;
    const CORRECT_FLASH_MS = 3000;
    const INCORRECT_MS     = 3000;
    const WRONG_IMG_MS     = 500;
    const IMG_PAD          = 4;

    let canvas = document.getElementById("gameCanvas");
    let ctx    = canvas.getContext("2d");

    let W, H, cellW, cellH;
    let doRotate;
    // drawW/drawH = dimensions passed to ctx.drawImage (the raw pixel size before rotation)
    // visW/visH   = visual footprint on screen after rotation
    let drawW, drawH, visW, visH;
    let isMobile, bgColor;

    let loadedImages = [];
    let clickPhase = 0, correctRegion = 0, correctImgName = "";
    let correctSide = "", nameLabelX = 0, nameLabelY = 0, gameActive = false;

    let slots    = { single: null, left: null, right: null };
    let slotImg  = { single: null, left: null, right: null };
    let slotVis  = { single: false, left: false, right: false };
    let labelVisible = false, labelText = "", labelX = 0, labelY = 0;
    let nameBelowVisible = false, nameBelowText = "", nameBelowX = 0, nameBelowY = 0;

    // ---- Preload ----
    function preloadImages(callback) {
        let loaded = 0;
        IMAGE_URLS.forEach((url, i) => {
            let img = new Image();
            img.onload  = () => { if (++loaded === IMAGE_URLS.length) callback(); };
            img.onerror = () => { if (++loaded === IMAGE_URLS.length) callback(); };
            img.src = url;
            loadedImages[i] = img;
        });
    }

    // ---- Recalc dimensions ----
    function recalc() {
        W = document.getElementById("gameContainer").clientWidth;
        H = document.getElementById("gameContainer").clientHeight;
        canvas.width  = W;
        canvas.height = H;

        cellW = W / GRID_COLS;
        cellH = H / GRID_ROWS;

        // Mobile = phone-sized screen
        isMobile = (Math.min(W, H) < 600);
        bgColor  = isMobile ? "#7ab8e8" : "#ffffff";

        // Portrait cells (cellH > cellW): rotate 16:9 image 90°
        // so long side of image aligns with long side of cell
        doRotate = (cellH > cellW);

        let maxW = cellW - IMG_PAD * 2;
        let maxH = cellH - IMG_PAD * 2;

        if (doRotate) {
            // After 90° rotation:
            //   image drawn as (drawW x drawH) appears as (drawH x drawW) on screen
            //   visW = drawH, visH = drawW
            // We want visW <= maxW and visH <= maxH
            // Keep 16:9: drawW/drawH = 16/9 → drawW = drawH*16/9
            // visW = drawH <= maxW  → drawH <= maxW
            // visH = drawW <= maxH  → drawH*16/9 <= maxH → drawH <= maxH*9/16
            drawH = Math.floor(Math.min(maxW, maxH * 9 / 16));
            drawW = Math.floor(drawH * 16 / 9);
            visW  = drawH;   // visual width  = drawH after rotation
            visH  = drawW;   // visual height = drawW after rotation
        } else {
            // Normal landscape: drawW x drawH, no rotation
            // drawW <= maxW, drawH <= maxH, drawW/drawH = 16/9
            drawW = Math.floor(Math.min(maxW, maxH * 16 / 9));
            drawH = Math.floor(drawW * 9 / 16);
            visW  = drawW;
            visH  = drawH;
        }
    }

    function getCenter(idx) {
        let row = Math.floor((idx - 1) / GRID_COLS) + 1;
        let col = ((idx - 1) % GRID_COLS) + 1;
        return { x: (col - 0.5) * cellW, y: (row - 0.5) * cellH };
    }

    function getRegion(mx, my) {
        let col = Math.floor(mx / cellW) + 1;
        let row = Math.floor(my / cellH) + 1;
        if (col < 1 || col > GRID_COLS || row < 1 || row > GRID_ROWS) return 0;
        return (row - 1) * GRID_COLS + col;
    }

    let centerIdx = ((Math.ceil(GRID_ROWS / 2) - 1) * GRID_COLS) + Math.ceil(GRID_COLS / 2);
    let leftIdx   = centerIdx - 1;
    let rightIdx  = centerIdx + 1;

    function makeSlot(idx) {
        let c = getCenter(idx);
        return {
            x: Math.floor(c.x - visW / 2),
            y: Math.floor(c.y - visH / 2),
            w: visW,
            h: visH
        };
    }

    // ---- Draw image into rect, with optional 90° rotation ----
    function drawImg(img, rect) {
        ctx.save();
        // Clip to rect so image never bleeds outside cell
        ctx.beginPath();
        ctx.rect(rect.x, rect.y, rect.w, rect.h);
        ctx.clip();

        if (doRotate) {
            // Move origin to center of rect
            ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
            ctx.rotate(Math.PI / 2);
            // Draw image centered: drawW is long side, drawH is short side
            // After rotation: drawW is vertical, drawH is horizontal — fills rect
            ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
        } else {
            ctx.drawImage(img, rect.x, rect.y, rect.w, rect.h);
        }
        ctx.restore();

        // Border on top
        ctx.strokeStyle = "#333333";
        ctx.lineWidth   = 2;
        ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
    }

    function drawLabel(text, cx, cy, bg, fg) {
        let fs = Math.max(10, Math.floor(Math.min(cellW, cellH) / 6));
        ctx.font = "bold " + fs + "px Arial";
        let tw = ctx.measureText(text).width;
        let pad = 7, bw = tw + pad*2, bh = fs + pad*2;
        let bx = Math.max(2, Math.min(cx - bw/2, W - bw - 2));
        let by = Math.max(2, Math.min(cy - bh/2, H - bh - 2));
        ctx.fillStyle = bg;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(bx, by, bw, bh, 4);
        else ctx.rect(bx, by, bw, bh);
        ctx.fill();
        ctx.fillStyle = fg;
        ctx.fillText(text, bx + pad, by + pad + fs * 0.85);
    }

    function render() {
        // Background
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, W, H);

        // Grid lines
        ctx.strokeStyle = "#000000";
        ctx.lineWidth = 1;
        for (let i = 1; i <= GRID_LINES; i++) {
            let x = W * i / (GRID_LINES + 1);
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        }
        for (let i = 1; i <= GRID_LINES; i++) {
            let y = H * i / (GRID_LINES + 1);
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }

        // Images
        ["single","left","right"].forEach(k => {
            if (slotVis[k] && slotImg[k] && slots[k])
                drawImg(slotImg[k], slots[k]);
        });

        // Region label
        if (labelVisible)
            drawLabel(labelText, labelX, labelY, "rgba(210,210,210,0.95)", "#000");

        // Name below (correct answer)
        if (nameBelowVisible)
            drawLabel(nameBelowText, nameBelowX, nameBelowY, "rgba(60,180,60,0.97)", "#fff");
    }

    function speak(text) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        let fixes = {
            "sea bass":"see bhass","bass":"bhass",
            "perch":"purch","gar":"garr","soy":"soe",
            "phalarope":"FAL-a-rope"
        };
        Object.keys(fixes).sort((a,b)=>b.length-a.length).forEach(w => {
            text = text.replace(new RegExp("\\b"+w+"\\b","gi"), fixes[w]);
        });
        let u = new SpeechSynthesisUtterance(text);
        u.rate=0.9; u.volume=1;
        window.speechSynthesis.speak(u);
    }

    function showFeedback(msg) {
        let fb = document.getElementById("feedback");
        fb.style.fontSize = Math.max(20, Math.floor(Math.min(W,H)/12)) + "px";
        fb.textContent = msg;
        fb.style.display = "block";
    }
    function hideFeedback() {
        document.getElementById("feedback").style.display = "none";
    }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function rnd(n)    { return Math.floor(Math.random() * n); }

    async function phaseOne() {
        gameActive = false; clickPhase = 0;
        recalc();

        let i1 = rnd(IMAGE_URLS.length);
        let i2 = rnd(IMAGE_URLS.length);
        while (i2 === i1) i2 = rnd(IMAGE_URLS.length);

        correctImgName = IMAGE_NAMES[i1];
        correctRegion  = Math.floor(Math.random() * GRID_ROWS * GRID_COLS) + 1;
        let lc = getCenter(correctRegion);

        slots.single   = makeSlot(centerIdx);
        slotImg.single = loadedImages[i1];
        slotVis.single = true;
        slotVis.left = slotVis.right = false;

        labelText = correctImgName;
        labelX = lc.x; labelY = lc.y;
        labelVisible = true;
        nameBelowVisible = false;

        render();
        await sleep(SHOW_SINGLE_MS);

        slotVis.single = false;
        labelVisible   = false;
        render();
        await sleep(GAP_BEFORE_PAIR);

        // Pair
        if (Math.random() < 0.5) {
            slotImg.left = loadedImages[i2]; slotImg.right = loadedImages[i1];
            correctSide = "right";
        } else {
            slotImg.left = loadedImages[i1]; slotImg.right = loadedImages[i2];
            correctSide = "left";
        }
        slots.left  = makeSlot(leftIdx);
        slots.right = makeSlot(rightIdx);
        slotVis.left = slotVis.right = true;

        render();
        clickPhase = 1; gameActive = true;
    }

    function hitTest(px, py, r) {
        return r && px>=r.x && px<=r.x+r.w && py>=r.y && py<=r.y+r.h;
    }

    function handleTap(px, py) {
        if (!gameActive) return;

        if (clickPhase === 1) {
            let hl = hitTest(px,py,slots.left);
            let hr = hitTest(px,py,slots.right);
            if (!hl && !hr) return;
            gameActive = false;
            let side = hl ? "left" : "right";

            if (side !== correctSide) {
                slotVis.left = slotVis.right = false;
                render(); showFeedback("WRONG\nIMAGE");
                sleep(WRONG_IMG_MS).then(()=>{hideFeedback();render();sleep(300).then(phaseOne);});
            } else {
                if (side==="left") {
                    slotVis.right = false;
                    nameLabelX = slots.left.x  + slots.left.w/2;
                    nameLabelY = slots.left.y  + slots.left.h + 18;
                } else {
                    slotVis.left  = false;
                    nameLabelX = slots.right.x + slots.right.w/2;
                    nameLabelY = slots.right.y + slots.right.h + 18;
                }
                render(); clickPhase = 2; gameActive = true;
            }
        }

        else if (clickPhase === 2) {
            gameActive = false;
            let region = getRegion(px, py);
            if (region === correctRegion) {
                nameBelowText = correctImgName;
                nameBelowX = nameLabelX; nameBelowY = nameLabelY;
                nameBelowVisible = true;
                render(); speak(correctImgName);
                sleep(CORRECT_FLASH_MS).then(()=>{
                    nameBelowVisible=false;
                    slotVis.left=slotVis.right=false;
                    render(); sleep(300).then(phaseOne);
                });
            } else {
                slotVis.left=slotVis.right=false;
                render(); showFeedback("WRONG");
                sleep(INCORRECT_MS).then(()=>{hideFeedback();render();sleep(300).then(phaseOne);});
            }
        }
    }

    document.addEventListener("click",    e => handleTap(e.clientX, e.clientY));
    document.addEventListener("touchend", e => {
        e.preventDefault();
        handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }, { passive: false });

    window.addEventListener("resize", ()=>{ recalc(); render(); });
    window.addEventListener("orientationchange", ()=>{ setTimeout(()=>{ recalc(); render(); }, 350); });

    preloadImages(()=>{ recalc(); render(); phaseOne(); });
</script>
</body>
</html>
